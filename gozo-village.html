let _worldDirty=true;
function doRebuildWorld(){
  if(!_worldDirty)return;
  _worldDirty=false;
  if(!WC_){WC_=document.createElement('canvas');WC_.width=WPX;WC_.height=WPY;}
  const ctx=WC_.getContext('2d');
  buildWorld(ctx);
}

function render(){
  if(!CV.width||!CV.height)return;
  doRebuildWorld();
  const vw=CV.width,vh=CV.height;
  X.fillStyle='#1a2e10';X.fillRect(0,0,vw,vh);
  X.save();X.translate(0,HH);
  if(WC_)animateWater();
  const sc=Math.max(0,Math.floor(-camX/TS)-1);
  const sr=Math.max(0,Math.floor(-camY/TS)-1);
  const ec=Math.min(WC,sc+Math.ceil(vw/TS)+3);
  const er=Math.min(WR,sr+Math.ceil((vh-HH-BH)/TS)+3);
  if(WC_)X.drawImage(WC_,0,0,WPX,WPY,camX,camY,WPX,WPY);

  // Fertility overlay
  if(_showFertility){
    for(let r2=sr;r2<er;r2++)for(let c2=sc;c2<ec;c2++){
      const tile=MAP[r2][c2];
      if(tile.t===T.GRASS||tile.t===T.FIELD){
        const fert=getTileFertility(c2,r2);const green=Math.round(fert*2);
        X.fillStyle=`rgba(0,${green},0,0.35)`;X.fillRect(c2*TS+camX,r2*TS+camY,TS,TS);
        if(TS>32){X.fillStyle='rgba(255,255,255,0.7)';X.font='8px sans-serif';X.textAlign='center';X.fillText(fert,c2*TS+camX+TS/2,r2*TS+camY+TS/2);}
      }
    }
  }

  for(let r2=sr;r2<er;r2++){
    const ry=r2*TS+camY;
    for(let c2=sc;c2<ec;c2++){
      const tile=MAP[r2][c2],wx=c2*TS+camX;
      if(tile.t===T.FIELD){
        const field=G.fields.find(f=>f.col===c2&&f.row===r2);
        if(field&&field.growStage>0&&field.growStage<4)drawCrop(field,wx,ry);
      }
      // Backyard behind house
      if(r2+2<WR){
        const belowTile=MAP[r2+2][c2];
        if(belowTile.bld?.type==='house'&&!tile.bld){
          const gbld=G.bld.find(b=>b.id===belowTile.bld.id);
          if(gbld?.backyard){const by=BYARD[gbld.backyard.type];if(by)drawBackyard(gbld.backyard.type,wx,ry,gbld.backyard.timer||0,by.prodTime||1);}
        }
      }
      if(tile.bld){
        drawBuilding(tile.bld.type,tile.bld.lv,wx,ry);
        const gbld2=G.bld.find(b=>b.id===tile.bld.id);
        if(gbld2){
          const maxW=BLD_WORKERS[tile.bld.type]||0;
          const wCount=maxW>0?(G.bldWorkers[gbld2.id]||[]).filter(n=>n).length:1;
          if(maxW>0&&wCount===0){X.fillStyle='rgba(100,100,100,0.25)';X.fillRect(wx,ry,TS,TS);X.font='10px serif';X.textAlign='center';X.fillText('⚠',wx+TS/2,ry+TS/2);}
          else if(gbld2._chainBlocked){const pulse=Math.abs(Math.sin(Date.now()/400))*0.3;X.fillStyle=`rgba(255,50,0,${pulse})`;X.fillRect(wx,ry,TS,TS);X.font='10px serif';X.textAlign='center';X.fillText('⛔',wx+TS/2,ry+TS/2);}
        }
      }
    }
    for(const deer of DEER)if(deer.alive&&Math.floor(deer.y/TS)===r2)drawDeer(deer);
    for(const npc of NPCS)if(Math.floor(npc.y/TS)===r2)drawNPC(npc);
    if(Math.floor(PL.y/TS)===r2)drawPlayer();
  }

  // Ghost cursor
  if(ghostTile.c>=0&&ghostTile.r>=0&&ghostTile.r<WR&&ghostTile.c<WC){
    const gx=ghostTile.c*TS+camX,gy=ghostTile.r*TS+camY;
    const tile=MAP[ghostTile.r][ghostTile.c];
    if(G.mode==='build'){
      const canPlace=tile.t!==T.WATER&&!tile.bld;
      X.fillStyle=canPlace?'rgba(80,255,80,0.2)':'rgba(255,80,80,0.2)';X.fillRect(gx,gy,TS,TS);
      X.strokeStyle=canPlace?'rgba(80,255,80,0.8)':'rgba(255,80,80,0.8)';X.lineWidth=2;X.strokeRect(gx,gy,TS,TS);
      if(canPlace&&buildType){X.globalAlpha=.42;drawBuilding(buildType,1,gx,gy);X.globalAlpha=1;}
    } else if(G.mode==='field'){
      const canField=tile.t===T.GRASS&&!tile.bld;
      X.fillStyle=canField?'rgba(180,150,30,0.3)':'rgba(255,80,80,0.2)';X.fillRect(gx,gy,TS,TS);
      X.strokeStyle=canField?'rgba(180,150,30,0.8)':'rgba(255,80,80,0.8)';X.lineWidth=2;X.strokeRect(gx,gy,TS,TS);
    } else if(G.mode==='road'){
      const canRoad=tile.t!==T.WATER&&tile.t!==T.PATH&&!tile.bld&&tile.decor!=='tree'&&tile.decor!=='bush';
      X.fillStyle=canRoad?'rgba(200,160,80,0.2)':'rgba(255,80,80,0.2)';X.fillRect(gx,gy,TS,TS);
      X.strokeStyle=canRoad?'rgba(200,160,80,0.8)':'rgba(255,80,80,0.8)';X.lineWidth=2;X.strokeRect(gx,gy,TS,TS);
    } else if(G.mode==='erase'){
      X.fillStyle='rgba(255,100,100,0.2)';X.fillRect(gx,gy,TS,TS);
    } else if(G.mode==='demo'){
      if(tile.bld){X.fillStyle='rgba(255,50,50,0.3)';X.fillRect(gx,gy,TS,TS);}
    }
  }

  // Minimap
  const MM=document.getElementById('mm');
  if(MM){
    const mctx=MM.getContext('2d');
    const mw=MM.width,mh=MM.height,tw=mw/WC,th=mh/WR;
    mctx.fillStyle='#1a2e10';mctx.fillRect(0,0,mw,mh);
    for(let r2=0;r2<WR;r2++)for(let c2=0;c2<WC;c2++){
      const t=MAP[r2][c2].t;
      mctx.fillStyle=t===T.WATER?'#4488cc':t===T.FOREST?'#1a5010':t===T.PATH?'#c0a050':t===T.FIELD?'#8a6020':'#3a7020';
      mctx.fillRect(c2*tw,r2*th,tw+1,th+1);
    }
    for(const b of G.bld){mctx.fillStyle='#e08020';mctx.fillRect(b.col*tw,b.row*th,tw+1,th+1);}
    for(const d of DEER){if(d.alive){mctx.fillStyle='#f0a030';mctx.fillRect(d.x/TS*tw-1,d.y/TS*th-1,2,2);}}
    mctx.fillStyle='#ffffff';mctx.fillRect(PL.x/TS*tw-1,PL.y/TS*th-1,3,3);
    const vw2=CV.width,vh2=CV.height-HH-BH;
    mctx.strokeStyle='rgba(255,255,100,0.7)';mctx.lineWidth=1;
    mctx.strokeRect((-camX/WPX)*mw,(-camY/WPY)*mh,(vw2/WPX)*mw,(vh2/WPY)*mh);
  }

  X.restore();
}

// ─── CANVAS EVENTS ───
let isDragging=false,dragMode='';
CV.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  const rect=CV.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top-HH;
  const c=Math.floor((mx-camX)/TS),r=Math.floor((my-camY)/TS);
  if(c<0||c>=WC||r<0||r>=WR)return;
  if(G.mode==='road'){isDragging=true;dragMode='road';tryPlaceRoad(c,r);}
  else if(G.mode==='erase'){isDragging=true;dragMode='erase';tryEraseRoad(c,r);}
  else if(G.mode==='field'){isDragging=true;dragMode='field';tryPlaceField(c,r);}
  else if(G.mode==='build'){tryPlaceBuilding(c,r);}
  else if(G.mode==='demo'){
    const tile=MAP[r][c];
    if(tile.bld){const gb=G.bld.find(b=>b.id===tile.bld.id);if(gb)showBldDlg(gb,c,r);}
  } else {
    const tile=MAP[r][c];
    if(tile.bld){const gb=G.bld.find(b=>b.id===tile.bld.id);if(gb)showBldDlg(gb,c,r);}
  }
});
CV.addEventListener('mousemove',e=>{
  const rect=CV.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top-HH;
  const c=Math.floor((mx-camX)/TS),r=Math.floor((my-camY)/TS);
  ghostTile={c,r};
  if(isDragging){
    if(dragMode==='road')tryPlaceRoad(c,r);
    else if(dragMode==='erase')tryEraseRoad(c,r);
    else if(dragMode==='field')tryPlaceField(c,r);
  }
});
CV.addEventListener('mouseup',()=>{isDragging=false;dragMode='';});
CV.addEventListener('mouseleave',()=>{isDragging=false;dragMode='';ghostTile={c:-1,r:-1};});

// Touch support
CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];const rect=CV.getBoundingClientRect();
  const mx=t.clientX-rect.left,my=t.clientY-rect.top-HH;
  const c=Math.floor((mx-camX)/TS),r=Math.floor((my-camY)/TS);
  if(c<0||c>=WC||r<0||r>=WR)return;
  if(G.mode==='road')tryPlaceRoad(c,r);
  else if(G.mode==='build')tryPlaceBuilding(c,r);
  else{const tile=MAP[r][c];if(tile.bld){const gb=G.bld.find(b=>b.id===tile.bld.id);if(gb)showBldDlg(gb,c,r);}}
},{passive:false});


function openBldWorker(bldId){
  const bld=G.bld.find(b=>b.id===bldId);
  if(!bld) return;
  const maxW=BLD_WORKERS[bld.type]||0;
  if(!maxW) return;
  const d=BD[bld.type];
  document.getElementById('bldworker-name').textContent=(d.e||'🏢')+' '+d.n+' — Pekerja';
  document.getElementById('bldworker-info').textContent=
    `Kapasitas: ${maxW} pekerja | Lokasi: (${bld.col},${bld.row}) | Lv.${bld.lv}`;
  if(!G.bldWorkers[bldId]) G.bldWorkers[bldId]=[];
  renderBldWorker(bldId, maxW);
  document.getElementById('bldworker').classList.add('show');
  closeDialog();
}

function closeBldWorker(){
  document.getElementById('bldworker').classList.remove('show');
}

function renderBldWorker(bldId, maxW){
  const list=document.getElementById('bldworker-list');
  list.innerHTML='';
  if(!G.bldWorkers[bldId]) G.bldWorkers[bldId]=[];
  const assigned=G.bldWorkers[bldId];

  // Show slots
  for(let i=0;i<maxW;i++){
    const row=document.createElement('div');
    row.className='bwrow';
    const npcName=assigned[i]||null;
    const npc=npcName?NPCS.find(n=>n.name===npcName):null;

    const slot=document.createElement('div');
    slot.className='bwslot';
    if(npc){
      const age=Math.floor(npc.age/90);
      slot.innerHTML=`Slot ${i+1}: <b style="color:#f0d060">${npc.name}</b> <span>${age}th — ${JOBS[npc.job||'idle']?.e||'😴'} ${JOBS[npc.job||'idle']?.n||'Idle'}</span>`;
      const removeBtn=document.createElement('button');
      removeBtn.textContent='✗ Lepas';
      removeBtn.style.cssText='padding:2px 6px;background:#200808;border:1px solid #802020;color:#c04040;font-size:9px;cursor:pointer';
      removeBtn.onclick=()=>{
        G.bldWorkers[bldId]=G.bldWorkers[bldId].filter(n=>n!==npcName);
        // Unset job if it was hunter assigned here
        if(npc&&npc.job==='hunter') npc.job=null;
        renderBldWorker(bldId,maxW);
      };
      row.appendChild(slot);row.appendChild(removeBtn);
    } else {
      slot.innerHTML=`Slot ${i+1}: <span>— kosong —</span>`;
      // Dropdown to pick adult NPC not yet assigned here
      const sel=document.createElement('select');
      sel.style.cssText='background:#100a04;border:1px solid #3a2a10;color:#a08050;font-size:11px;padding:2px 4px;cursor:pointer';
      const blank=document.createElement('option');blank.value='';blank.textContent='Pilih warga...';sel.appendChild(blank);
      for(const n of NPCS){
        if(!isAdult(n)) continue;
        if(Object.values(G.bldWorkers).flat().includes(n.name)) continue; // already assigned elsewhere
        if(isHomeBusiness(n.houseId)) continue; // locked to home business
        const opt=document.createElement('option');
        opt.value=n.name;
        opt.textContent=n.name+' ('+Math.floor(n.age/90)+'th)';
        sel.appendChild(opt);
      }
      sel.onchange=()=>{
        if(!sel.value) return;
        G.bldWorkers[bldId]=G.bldWorkers[bldId].filter(n=>n);
        G.bldWorkers[bldId][i]=sel.value;
        // Auto-assign hunter job
        const n=NPCS.find(np=>np.name===sel.value);
        const bld=G.bld.find(b=>b.id===bldId);
        if(n&&bld){
          // Assign job based on building type
          const jobMap={hunting:'hunter',farm:'farmer',logger:'logger',quarry:'miner',
            coalmine:'miner',smelter:'smelter',market:'trader',blacksmith:'builder'};
          if(jobMap[bld.type]) n.job=jobMap[bld.type];
        }
        renderBldWorker(bldId,maxW);
      };
      row.appendChild(slot);row.appendChild(sel);
    }
    list.appendChild(row);
  }

  // Production preview
  const bld=G.bld.find(b=>b.id===bldId);
  const activeWorkers=assigned.filter(n=>n).length;
  const preview=document.createElement('div');
  preview.style.cssText='padding:7px 10px;font-size:11px;color:#80b060;background:rgba(0,80,0,0.1)';
  const d=BD[bld?.type];
  const prod=d?.pr?Object.entries(d.pr).map(([k,v])=>`+${v*bld.lv*activeWorkers} ${k}`).join(' '):'—';
  preview.textContent=`👷 ${activeWorkers}/${maxW} pekerja aktif | Produksi: ${prod}/hari`;
  list.appendChild(preview);
}

function closeByPanel(){ document.getElementById('bypanel').classList.remove('show'); _byHouseId=null; }

function renderByPanel(){
  const list=document.getElementById('bylist');
  list.innerHTML='';
  const bld=G.bld.find(b=>b.id===_byHouseId);
  if(!bld) return;
  if(!bld.backyard) bld.backyard=null;

  const resIcons={wood:'🪵',stone:'🪨',coal:'⚫',metal:'⚙',food:'🌾',meat:'🥩',
    leather:'🧴',egg:'🥚',honey:'🍯',cloth:'🧶',beer:'🍺',weapon:'⚔',armor:'🛡',shoe:'👟',cloak:'🧥'};

  // House upgrade section
  const upDiv=document.createElement('div');
  upDiv.className='bycat';
  upDiv.textContent='🏠 STATUS RUMAH (Lv.'+bld.lv+'/'+(BD.house.ml||3)+')';
  list.appendChild(upDiv);

  const upRow=document.createElement('div');
  upRow.style.cssText='padding:8px 10px;';
  const nextLv=bld.lv+1;
  const upReq=BD.house.upReq?.[nextLv];
  if(upReq&&bld.lv<(BD.house.ml||3)){
    const checks=Object.entries(upReq).map(([k,v])=>{
      const has=G.bld.some(b=>b.type===k);
      return `${has?'✅':'❌'} ${BD[k]?.n||k}`;
    });
    const upCost=BD.house.upCost?.[nextLv]||{};
    const costStr=Object.entries(upCost).map(([k,v])=>resIcons[k]+v).join(' ');
    const lvdesc=BD.house.lvDesc?.[nextLv]||'';
    upRow.innerHTML='<div style="font-size:10px;color:#c0a840;margin-bottom:4px">'+lvdesc+'</div>'
      +'<div style="font-size:11px;color:#e0c060;font-weight:bold">Syarat Upgrade ke Lv.'+nextLv+':</div>'
      +'<div style="font-size:11px;color:#a09060;margin-top:4px">'+checks.join('  ')+'</div>'
      +'<div style="font-size:11px;color:#8090a0;margin-top:3px">Biaya: '+costStr+'</div>'
      +'<button onclick="tryUpgradeHouse('+bld.id+')" style="margin-top:6px;padding:3px 8px;background:#100a04;border:1px solid #3a2a10;color:#a08050;font-size:10px;cursor:pointer">⬆ Upgrade</button>';
  } else if(bld.lv>=(BD.house.ml||3)){
    upRow.innerHTML='<div style="font-size:11px;color:#60c060">✅ Rumah sudah maksimal!</div>';
  }
  list.appendChild(upRow);

  // ── BACKYARD AKTIF sekarang ──
  const activeDiv=document.createElement('div');
  activeDiv.className='bycat';
  activeDiv.textContent='🏡 BACKYARD SEKARANG';
  list.appendChild(activeDiv);
  const activeRow=document.createElement('div');
  activeRow.style.cssText='padding:8px 10px;';
  if(bld.backyard){
    const by=BYARD[bld.backyard.type];
    const prod=Object.entries(by.prod).map(([k,v])=>resIcons[k]+'+'+v).join(' ');
    // Progress within current production cycle (timer resets after each cycle)
    const rawTimer=bld.backyard.timer||0;
    // Normalize: prodTime is threshold in doProd-days (each doProd adds 2)
    const cyclePct=Math.min(100,Math.round((rawTimer/Math.max(by.prodTime,1))*100));
    const pct=cyclePct;
    const totalProd=bld.backyard.totalProd||0;
    const nextIn=Math.ceil((by.prodTime-(bld.backyard.timer||0))/2)+' hari lagi';
    activeRow.innerHTML='<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:22px">'+by.e+'</span>'
      +'<div><div style="font-size:12px;color:#f0d060;font-weight:bold">'+by.n+'</div>'
      +'<div style="font-size:11px;color:#80b060">Produksi: '+prod+'/hari</div>'
      +'<div style="font-size:10px;color:#808060">Siklus: '+pct+'% ('+nextIn+')</div>'
      +'<div style="font-size:10px;color:#606050">Total diproduksi: '+totalProd+' kali</div>'
      +'<div class="byprog" style="margin-top:3px;width:140px"><div class="byprog-bar" style="width:'+pct+'%"></div></div>'
      +'</div><button onclick="removeByard()" style="margin-left:8px;padding:3px 7px;background:#200808;border:1px solid #802020;color:#c04040;font-size:10px;cursor:pointer">🗑 Bongkar</button></div>';
  } else {
    activeRow.innerHTML='<div style="font-size:11px;color:#806040">Belum ada — pilih dari daftar di bawah</div>';
  }
  list.appendChild(activeRow);

  // ── PILIH / GANTI BACKYARD ──
  const chooseDiv=document.createElement('div');
  chooseDiv.className='bycat';
  const slots=BD.house.byardSlots[bld.lv];
  const slotsLabel=slots==='all'?'Semua tersedia':'Terbatas Lv.'+bld.lv;
  chooseDiv.textContent='🔧 PILIH / GANTI BACKYARD ('+slotsLabel+')';
  list.appendChild(chooseDiv);
  if(bld.backyard){
    const noteDiv=document.createElement('div');
    noteDiv.style.cssText='padding:5px 10px;font-size:10px;color:#c08030;';
    noteDiv.textContent='⚠ Mengganti akan membongkar yang lama (bahan tidak kembali)';
    list.appendChild(noteDiv);
  }
  const cats={grow:'🌿 Berkebun',animal:'🐄 Peternakan',craft:'⚒ Kerajinan'};
  for(const[catId,catName]of Object.entries(cats)){
    const hdr=document.createElement('div');
    hdr.style.cssText='padding:3px 10px 2px;font-size:10px;color:#a08040;background:rgba(0,0,0,.15);';
    hdr.textContent=catName;
    list.appendChild(hdr);
    for(const[id,by]of Object.entries(BYARD)){
      if(by.cat!==catId) continue;
      const active=bld.backyard?.type===id;
      const row=document.createElement('div');
      row.className='byrow'+(active?' active':'');
      const cost=Object.entries(by.cost).map(([k,v])=>resIcons[k]+v).join(' ');
      const prod2=Object.entries(by.prod).map(([k,v])=>resIcons[k]+'+'+v).join(' ');
      const canAffBy=canAff(by.cost);
      const bySlots=BD.house.byardSlots[bld.lv];
      const isLocked=bySlots!=='all'&&!bySlots.includes(id);
      let btn='';
      if(active){
        btn='<span style="color:#40c040;font-size:11px">✓ Aktif</span>';
      } else if(isLocked){
        btn='<span style="color:#606060;font-size:9px">🔒 Butuh Lv.'+(bld.lv<2?2:3)+'</span>';
      } else if(canAffBy){
        btn='<button onclick="setByard(\''+id+'\')" style="padding:4px 8px;background:#102008;border:1px solid #308020;color:#60d040;font-size:10px;cursor:pointer">✓ Pilih</button>';
      } else {
        const need=Object.entries(by.cost).filter(([k,v])=>(G.res[k]||0)<v).map(([k,v])=>resIcons[k]+(v-(G.res[k]||0))+' kurang').join(', ');
        btn='<span style="color:#806040;font-size:9px">'+need+'</span>';
      }
      row.innerHTML='<div class="byicon">'+by.e+'</div>'
        +'<div class="byinfo"><div class="byname">'+by.n+'</div>'
        +'<div class="bydesc" style="font-size:10px">'+by.desc+'</div>'
        +'<div class="bycost" style="font-size:9px">Biaya: '+cost+' | Hasil: '+prod2+'/hari</div></div>'
        +'<div style="flex-shrink:0;min-width:80px;text-align:right">'+btn+'</div>';
      list.appendChild(row);
    }
  }
}

function setByard(type){
  if(!_byHouseId) return;
  const bld=G.bld.find(b=>b.id===_byHouseId);
  if(!bld) return;
  const by=BYARD[type];
  if(!by) return;
  // Check backyard unlock by house level
  const slots=BD.house.byardSlots[bld.lv];
  if(slots!=='all'&&!slots.includes(type)){
    notify('🏠 Upgrade rumah ke Lv.2 untuk membuka '+by.n+'!','err'); return;
  }
  if(!canAff(by.cost)){ notify('Kurang bahan!','err'); return; }
  // Confirm if replacing existing backyard
  if(bld.backyard&&bld.backyard.type!==type){
    const old=BYARD[bld.backyard.type];
    openDlg('Ganti Backyard?',
      'Backyard '+old.e+' '+old.n+' akan dibongkar (bahan tidak kembali).',
      [{l:'✓ Ya, ganti',cls:'ok',fn:()=>{
        pay(by.cost);
        bld.backyard={type,lv:1,progress:0,timer:0,totalProd:0,_reqWarn:false};
        if(bld.row>0){MAP[bld.row-1][bld.col].decor=null;_worldDirty=true;}
        notify('🏡 Backyard diganti ke '+by.n+'!','ok');
        renderByPanel();updateUI();closeDialog();
      }},{l:'✗ Batal',cls:'',fn:closeDialog}]
    );
    return;
  }
  pay(by.cost);
  bld.backyard={type,lv:1,progress:0,timer:0,totalProd:0,_reqWarn:false};
  // Clear tile behind house so backyard is visible
  if(bld.row>0){
    MAP[bld.row-1][bld.col].decor=null;
    _worldDirty=true;
  }
  notify('🏡 '+by.n+' dibangun!','ok');
  renderByPanel(); updateUI();
}

function removeByard(){
  if(!_byHouseId) return;
  const bld=G.bld.find(b=>b.id===_byHouseId);
  if(!bld||!bld.backyard) return;
  const by=BYARD[bld.backyard.type];
  openDlg('Bongkar '+by.n+'?','Bahan tidak kembali.',
    [{l:'✓ Ya',cls:'bad',fn:()=>{
      bld.backyard=null;
      notify('🗑 Backyard dibongkar','warn');
      renderByPanel();updateUI();closeDialog();
    }},{l:'✗ Batal',cls:'',fn:closeDialog}]
  );
}

function tryUpgradeHouse(bldId){
  const bld=G.bld.find(b=>b.id===bldId);
  if(!bld) return;
  const nextLv=bld.lv+1;
  if(nextLv>3){ notify('Rumah sudah level maksimal!','warn'); return; }
  const upReq=BD.house.upReq?.[nextLv]||{};
  // Check building requirements
  for(const[k]of Object.entries(upReq)){
    if(!G.bld.some(b=>b.type===k)){
      notify('Perlu '+(BD[k]?.n||k)+' di desa dulu!','err'); return;
    }
  }
  // Check market supply
  if(bld._canUpgrade===false){
    notify('🏪 Rumah harus mendapat pasokan Food & Fuel dari pasar dulu!','err'); return;
  }
  // Check resource cost
  const upgCost=BD.house.upCost?.[nextLv]||{wood:20*bld.lv,stone:15*bld.lv};
  if(!canAff(upgCost)){ notify('Kurang bahan: '+Object.entries(upgCost).map(([k,v])=>k+':'+v).join(', '),'err'); return; }
  pay(upgCost);
  bld.lv=nextLv;
  notify('🏠 Rumah Lv.'+nextLv+'! '+BD.house.lvDesc[nextLv],'ok');
  renderByPanel(); updateUI();
}

// ── MARKET PRODUCTION ──
function updateMarket(){
  if(!G.market) G.market={food:{stock:0,variety:0},fuel:{stock:0},clothing:{stock:0,variety:0}};

  // Reset variety each cycle
  G.market.food.variety=0;
  G.market.clothing.variety=0;

  for(const stallType of ['food_stall','fuel_stall','clothing_stall']){
    const def=STALL_DEFS[stallType];
    // Find stall buildings with workers
    const stalls=G.bld.filter(b=>b.type===stallType);
    for(const stall of stalls){
      const workers=(G.bldWorkers[stall.id]||[]).filter(n=>n);
      if(!workers.length) continue;

      // Check source storage has worker too
      const srcOk=hasStorageWorker(def.sells[0])||def.sells.some(r=>hasStorageWorker(r));
      if(!srcOk) continue;

      // Draw goods from storage and add to stall stock
      const need=def.need;
      let drawn=0;
      for(const res of def.sells){
        const avail=G.res[res]||0;
        if(avail>0){
          const take=Math.min(avail, 5*workers.length);
          G.res[res]=avail-take;
          drawn+=take;
          // Count variety for food and clothing
          if(need==='food'&&res!=='food') G.market.food.variety++;
          if(need==='clothing') G.market.clothing.variety++;
        }
      }
      if(need==='food')    G.market.food.stock    =Math.min(100,(G.market.food.stock||0)+drawn);
      if(need==='fuel')    G.market.fuel.stock    =Math.min(100,(G.market.fuel.stock||0)+drawn);
      if(need==='clothing')G.market.clothing.stock=Math.min(100,(G.market.clothing.stock||0)+drawn);
    }
  }

  // Distribute market goods to houses within range
  const houses=G.bld.filter(b=>b.type==='house');
  for(const house of houses){
    const inRange=nearMarket(house.id);
    const residents=NPCS.filter(n=>n.houseId===house.id).length||2;
    const lvl=house.lv||1;

    // Food from market
    const foodNeed=lvl*residents;
    if(inRange&&G.market.food.stock>=foodNeed){
      G.market.food.stock-=foodNeed;
      house._mktFood=true;
      // Variety bonus to happiness
      if(G.market.food.variety>=3) G.happy=Math.min(100,G.happy+1);
    } else {
      house._mktFood=false;
      if(house.lv>=1) G.happy=Math.max(0,G.happy-3);
    }

    // Fuel from market
    const fuelNeed=lvl;
    if(inRange&&G.market.fuel.stock>=fuelNeed){
      G.market.fuel.stock-=fuelNeed;
      house._mktFuel=true;
    } else {
      house._mktFuel=false;
      if(house.lv>=1) G.happy=Math.max(0,G.happy-2);
    }

    // Clothing from market (lv2+)
    if(lvl>=2){
      const clothNeed=residents;
      if(inRange&&G.market.clothing.stock>=clothNeed){
        G.market.clothing.stock-=clothNeed;
        house._mktCloth=true;
        if(G.market.clothing.variety>=2) G.happy=Math.min(100,G.happy+1);
      } else {
        house._mktCloth=false;
        G.happy=Math.max(0,G.happy-2);
      }
    }

    // Block upgrade if missing market supply
    house._canUpgrade=(house._mktFood&&house._mktFuel);
  }

  // Notify if stocks critically low
  if(G.market.food.stock<5)    notify('🥘 Stok makanan di pasar hampir habis!','warn');
  if(G.market.fuel.stock<5)    notify('🪵 Stok bahan bakar di pasar habis!','warn');
  if(G.market.clothing.stock<5&&G.bld.some(b=>b.type==='clothing_stall')) notify('👘 Stok pakaian habis!','warn');
}

// Backyard production — called from doProd every 2 days
function doByardProd(){
  const mul=G.season===3?.7:G.season===1?1.2:1;
  for(const bld of G.bld){
    if(bld.type!=='house'||!bld.backyard) continue;
    const by=BYARD[bld.backyard.type];
    if(!by) continue;

    // Home business: needs adult family member at home
    const craftTypes=['smithy','tannery','shoemaker','tailor','brewery','armor'];
    const isCraft=craftTypes.includes(bld.backyard.type);
    if(isCraft){
      const homeAdults=NPCS.filter(n=>n.houseId===bld.id&&isAdult(n));
      if(!homeAdults.length) continue; // no adult = no production
    }

    bld.backyard.timer=(bld.backyard.timer||0)+2;
    if(bld.backyard.timer>=by.prodTime){
      bld.backyard.timer=0;
      let canProduce=true;
      for(const[k,v]of Object.entries(by.req||{})){
        if((G.res[k]||0)<v){ canProduce=false; break; }
      }
      if(canProduce){
        for(const[k,v]of Object.entries(by.req||{})) G.res[k]=Math.max(0,(G.res[k]||0)-v);
        // Home business: locked adults get efficiency bonus
        const effBonus=isCraft?1.3:1.0;
        for(const[k,v]of Object.entries(by.prod)) addR(k,Math.round(v*mul*effBonus));
        bld.backyard.totalProd=(bld.backyard.totalProd||0)+1;
        if(bld.backyard.totalProd===1) notify(by.e+' '+by.n+' mulai produksi!','ok');
      } else if(Object.keys(by.req||{}).length>0){
        if(!bld.backyard._reqWarn){ bld.backyard._reqWarn=true;
          const need=Object.entries(by.req).filter(([k,v])=>(G.res[k]||0)<v).map(([k,v])=>k).join(', ');
          notify('⚠ '+by.n+' butuh: '+need,'warn');
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
//  VILLAGE MUSIC — Web Audio API generative
//  Suasana: gamelan + flute + soft percussion pedesaan
// ═══════════════════════════════════════════════════════
let audioCtx=null, musicOn=false, musicNodes=[], musicScheduler=null;
let masterGain=null;

function initAudio(){
  if(audioCtx) return;
  try{
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);
  }catch(e){console.warn('Audio init failed:',e.message);}
}

// Reverb convolver sederhana
function makeReverb(ctx, seconds=1.8, decay=2.5){
  const rate=ctx.sampleRate, len=rate*seconds;
  const buf=ctx.createBuffer(2,len,rate);
  for(let c=0;c<2;c++){
    const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  const conv=ctx.createConvolver(); conv.buffer=buf; return conv;
}

function playNote(freq, startTime, duration, vol=0.18, type='sine', pan=0){
  if(!audioCtx) return;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const panner=audioCtx.createStereoPanner();
  panner.pan.value=pan;
  osc.type=type;
  osc.frequency.setValueAtTime(freq, startTime);
  // Slight detune for warmth
  osc.detune.setValueAtTime((Math.random()-0.5)*8, startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(vol, startTime+0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime+duration);
  osc.connect(gain); gain.connect(panner); panner.connect(masterGain);
  osc.start(startTime); osc.stop(startTime+duration+0.05);
  musicNodes.push(osc);
}

// Marimba / gamelan hit — attack fast, decay slow
function playMarimba(freq, t, vol=0.22, pan=0){
  const osc=audioCtx.createOscillator();
  const osc2=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const panner=audioCtx.createStereoPanner();
  panner.pan.value=pan;
  osc.type='sine'; osc.frequency.value=freq;
  osc2.type='sine'; osc2.frequency.value=freq*2.76; // inharmonic partial like gamelan
  const g2=audioCtx.createGain(); g2.gain.value=0.3;
  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(vol,t+0.005);
  gain.gain.exponentialRampToValueAtTime(0.001,t+1.4);
  osc.connect(gain); osc2.connect(g2); g2.connect(gain);
  gain.connect(panner); panner.connect(masterGain);
  osc.start(t); osc.stop(t+1.5);
  osc2.start(t); osc2.stop(t+1.5);
  musicNodes.push(osc,osc2);
}

// Soft drum / kendang hit
function playDrum(t, freq=120, vol=0.18, decay=0.12){
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(freq,t);
  osc.frequency.exponentialRampToValueAtTime(freq*0.4,t+decay);
  gain.gain.setValueAtTime(vol,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+decay+0.05);
  osc.connect(gain); gain.connect(masterGain);
  osc.start(t); osc.stop(t+decay+0.1);
  musicNodes.push(osc);
}

// Noise shaker / castanet
function playShaker(t, vol=0.04){
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.05,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=audioCtx.createBufferSource();
  const gain=audioCtx.createGain();
  const filt=audioCtx.createBiquadFilter();
  filt.type='highpass'; filt.frequency.value=4000;
  src.buffer=buf;
  gain.gain.setValueAtTime(vol,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  src.connect(filt); filt.connect(gain); gain.connect(masterGain);
  src.start(t); src.stop(t+0.1);
  musicNodes.push(src);
}

// Pentatonic scale — suasana Asia/gamelan (dalam Hz)
// C pentatonic: C D E G A
const PENTA=[
  130.81,146.83,164.81,196.00,220.00, // oktaf 3
  261.63,293.66,329.63,392.00,440.00, // oktaf 4
  523.25,587.33,659.25,783.99,880.00, // oktaf 5
];

// Melody patterns — motif pedesaan yang looping
const MELODY_PATTERNS=[
  // Motif 1: naik turun riang
  [4,6,7,9,7,6,4,6, 4,3,1,3,4,6,4,3],
  // Motif 2: mengalir seperti angin
  [6,7,9,7,6,4,3,4, 6,9,7,6,4,6,7,6],
  // Motif 3: melankolis sore
  [9,7,6,4,6,7,6,4, 3,4,6,4,3,1,3,4],
];

let melodyPattern=0, beatCount=0;

function scheduleMusic(){
  if(!audioCtx||!musicOn) return;
  const now=audioCtx.currentTime;
  const bpm=80; // lambat, santai
  const beat=60/bpm;
  const bar=beat*4;

  // Pilih pattern setiap 2 bar
  if(beatCount%8===0) melodyPattern=(melodyPattern+1)%MELODY_PATTERNS.length;

  const pat=MELODY_PATTERNS[melodyPattern];
  const patIdx=(beatCount%16);

  // ── MELODY (flute-like) ──
  const mFreq=PENTA[pat[patIdx]];
  const mDur=beat*(patIdx%4===0?0.9:0.45);
  playNote(mFreq, now, mDur, 0.15, 'sine', -0.2);
  // Harmony (oktaf atas, lebih pelan)
  if(patIdx%2===0) playNote(mFreq*2, now, mDur*0.8, 0.06, 'sine', 0.3);

  // ── GAMELAN/MARIMBA bassline ──
  if(patIdx%4===0){
    const bassFreq=PENTA[pat[patIdx]-4>0?pat[patIdx]-4:0]*0.5;
    playMarimba(bassFreq, now, 0.18, -0.5);
  }
  if(patIdx%4===2){
    const bassFreq=PENTA[Math.max(0,pat[patIdx]-2)]*0.5;
    playMarimba(bassFreq, now, 0.12, 0.4);
  }

  // ── KENDANG (drum pattern) ──
  // Beat 1 & 3: bass drum
  if(patIdx%4===0) playDrum(now, 110, 0.20, 0.15);
  // Beat 2 & 4: snare-like
  if(patIdx%4===2) playDrum(now, 260, 0.12, 0.08);
  // Off-beats
  if(patIdx%2===1) playDrum(now, 180, 0.07, 0.06);

  // ── SHAKER / ANGKLUNG feel ──
  if(patIdx%2===0) playShaker(now+beat*0.5, 0.05);
  if(patIdx%4===1) playShaker(now, 0.04);

  // ── AMBIENT pad (strings/kecapi) ──
  if(patIdx%8===0){
    const chord=[PENTA[4],PENTA[6],PENTA[9]];
    for(const f of chord){
      playNote(f, now, bar*1.8, 0.04, 'sine', (Math.random()-0.5)*0.6);
    }
  }

  // Cleanup old nodes
  if(beatCount%16===0) musicNodes=musicNodes.filter(n=>{ try{return n.context.state!=='closed';}catch{return false;} });

  beatCount++;
  const nextBeat=now+beat;
  musicScheduler=setTimeout(()=>{if(musicOn)scheduleMusic();}, (beat-0.05)*1000);
}

function toggleMusic(){
  initAudio();
  if(audioCtx.state==='suspended') audioCtx.resume();
  musicOn=!musicOn;
  const btn=document.getElementById('tb-music');
  if(musicOn){
    btn.textContent='🔇';
    btn.classList.add('on');
    masterGain.gain.setValueAtTime(0,audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.8,audioCtx.currentTime+1.5);
    beatCount=0;
    scheduleMusic();
    notify('🎵 Musik desa dimulai','ok');
  } else {
    btn.textContent='🎵';
    btn.classList.remove('on');
    masterGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.5);
    clearTimeout(musicScheduler);
    notify('🔇 Musik dimatikan','warn');
  }
}
