<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gozo Village</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;overflow:hidden;font-family:'VT323',monospace}
#c{display:block;image-rendering:pixelated}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;height:40px;z-index:100;
  background:rgba(15,10,5,0.92);border-bottom:2px solid #6a4a1a;
  display:flex;align-items:center;gap:6px;padding:0 10px;}
#logo{font-family:'Press Start 2P';font-size:9px;color:#f0c040;text-shadow:1px 1px #8b4000;flex-shrink:0}
.hdv{width:2px;height:26px;background:#5a3a1a;flex-shrink:0}
#resbar{display:flex;gap:3px;flex:1;flex-wrap:wrap}
.res{display:flex;align-items:center;gap:2px;background:rgba(10,6,2,.9);border:1px solid #3a2a10;padding:1px 5px;font-size:14px;color:#e8d090}
.res b{color:#f0d060;min-width:22px;text-align:right}
#vpills{display:flex;gap:3px;flex-shrink:0}
.vp{background:rgba(10,6,2,.9);border:1px solid #3a2a10;padding:1px 6px;font-size:13px;color:#f0c040}
/* MINIMAP */
#mm{position:fixed;top:46px;right:8px;z-index:95;border:2px solid #5a3a1a}
#mmc{display:block}
/* TOOLBAR — bottom, like Minecraft hotbar */
#toolbar{position:fixed;bottom:0;left:0;right:0;height:40px;z-index:100;
  background:rgba(10,6,2,.92);border-top:2px solid #5a3a1a;
  display:flex;align-items:center;justify-content:center;gap:8px;padding:0 12px}
.tbtn{padding:2px 8px;background:#100a04;border:1px solid #3a2a10;color:#908060;
  font-family:'Press Start 2P';font-size:6px;cursor:pointer;transition:all .1s}
.tbtn:hover,.tbtn.on{border-color:#f0c040;color:#f0c040;background:rgba(240,192,64,.08)}
#timelbl{font-family:'Press Start 2P';font-size:6px;color:#c09040;
  padding:2px 8px;background:#100a04;border:1px solid #3a2a10}
/* BUILD POPUP */
#buildpanel{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);
  z-index:200;background:rgba(8,5,2,.97);border:2px solid #5a3a1a;
  width:720px;max-width:96vw;display:none;flex-direction:column;
  box-shadow:0 -4px 20px rgba(0,0,0,.8)}
#buildpanel.show{display:flex}
#bptabs{display:flex;border-bottom:2px solid #3a2a10}
.bptab{flex:1;padding:5px;background:0;border:0;color:#706040;
  font-family:'Press Start 2P';font-size:6px;cursor:pointer;border-bottom:2px solid transparent}
.bptab.on{color:#f0c040;border-bottom-color:#f0c040}
#bpscroll{display:flex;flex-wrap:wrap;gap:4px;padding:8px;max-height:160px;overflow-y:auto}
.bitem{background:#100a04;border:1px solid #3a2a10;padding:5px 7px;cursor:pointer;
  text-align:center;min-width:72px;transition:border-color .1s}
.bitem:hover,.bitem.on{border-color:#f0c040}
.bitem .bi{font-size:16px;display:block;margin-bottom:2px}
.bitem .bn{font-family:'Press Start 2P';font-size:5px;color:#f0c040;display:block}
.bitem .bc{font-size:10px;color:#907050;display:block;margin-top:1px}
/* DIALOG */
#dialog{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);
  z-index:300;background:rgba(6,3,1,.97);border:2px solid #5a3a1a;
  padding:12px 16px;width:480px;max-width:94vw;display:none}
#dialog.show{display:block}
#dname{font-family:'Press Start 2P';font-size:8px;color:#f0c040;margin-bottom:5px}
#dmsg{font-size:14px;color:#c8a870;line-height:1.5;margin-bottom:8px}
#dbtns{display:flex;gap:5px;flex-wrap:wrap}
.dbtn{padding:4px 9px;background:#100a04;border:1px solid #3a2a10;
  color:#a08050;font-family:'Press Start 2P';font-size:6px;cursor:pointer}
.dbtn:hover{border-color:#f0c040;color:#f0c040}
.dbtn.ok{border-color:#208020;color:#40c040}
.dbtn.bad{border-color:#802020;color:#c04040}
/* NOTIFS */
#notifs{position:fixed;top:46px;left:50%;transform:translateX(-50%);
  z-index:400;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none}
.ntf{background:rgba(4,2,1,.96);border:1px solid #5a3a1a;padding:4px 10px;
  font-size:13px;color:#e8d090;animation:nfin .2s,nfout .4s 2.2s forwards}
.ntf.ok{border-color:#208020;color:#40c040}
.ntf.err{border-color:#802020;color:#c04040}
.ntf.warn{border-color:#806020;color:#e0a020}
@keyframes nfin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes nfout{to{opacity:0}}
/* WORKER PANEL */
#wpanel{position:fixed;top:40px;right:8px;z-index:200;background:rgba(8,4,2,.97);
  border:2px solid #5a3a1a;width:280px;display:none;max-height:70vh;overflow-y:auto}
#wpanel.show{display:block}
#wpanel-title{font-family:'Press Start 2P';font-size:7px;color:#f0c040;
  padding:6px 10px;border-bottom:2px solid #3a2a10;display:flex;justify-content:space-between;align-items:center}
.wrow{display:flex;align-items:center;gap:6px;padding:6px 8px;border-bottom:1px solid rgba(90,58,26,.25)}
.wrow:hover{background:rgba(240,192,64,.05)}
.wname{font-family:'Press Start 2P';font-size:5px;color:#e0c880;flex:1;min-width:0}
.wjob-sel{background:#100a04;border:1px solid #3a2a10;color:#a08050;
  font-family:'VT323';font-size:14px;padding:1px 3px;cursor:pointer;flex-shrink:0;max-width:120px}
.wjob-sel:focus{outline:none;border-color:#f0c040}
.wprod{font-size:11px;color:#708050;margin-left:2px;flex-shrink:0;min-width:60px;text-align:right}
/* BUILDING WORKER PANEL */
#bldworker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:500;background:rgba(8,4,2,.97);border:2px solid #5a3a1a;
  width:400px;max-width:96vw;display:none}
#bldworker.show{display:block}
#bldworker-title{font-family:'Press Start 2P';font-size:7px;color:#f0c040;
  padding:7px 10px;border-bottom:2px solid #3a2a10;display:flex;justify-content:space-between;align-items:center}
.bwrow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(90,58,26,.2)}
.bwrow:hover{background:rgba(240,192,64,.06)}
.bwslot{flex:1;font-family:'Press Start 2P';font-size:5px;color:#e0c880}
.bwslot span{color:#808060;font-size:10px;font-family:VT323}
/* BACKYARD PANEL */
#bypanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:500;background:rgba(8,4,2,.97);border:2px solid #5a3a1a;
  width:520px;max-width:96vw;max-height:80vh;overflow-y:auto;display:none}
#bypanel.show{display:block}
#bypanel-title{font-family:'Press Start 2P';font-size:7px;color:#f0c040;
  padding:7px 10px;border-bottom:2px solid #3a2a10;display:flex;justify-content:space-between}
.bycat{padding:5px 10px 3px;font-family:'Press Start 2P';font-size:5px;color:#c09040;
  border-bottom:1px solid rgba(90,58,26,.3);background:rgba(0,0,0,.2)}
.byrow{display:flex;align-items:center;gap:6px;padding:6px 10px;
  border-bottom:1px solid rgba(90,58,26,.18);cursor:pointer}
.byrow:hover{background:rgba(240,192,64,.07)}
.byrow.active{background:rgba(64,200,64,.08);border-left:3px solid #40c040}
.byicon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.byinfo{flex:1}
.byname{font-family:'Press Start 2P';font-size:6px;color:#f0d060}
.bydesc{font-size:11px;color:#a08050;margin-top:2px}
.bycost{font-size:10px;color:#807040;margin-top:1px}
.byprog{height:5px;background:#1a1008;border-radius:2px;margin-top:3px;overflow:hidden}
.byprog-bar{height:100%;background:#60c040;transition:width .3s}
/* DPAD mobile */
#dpad{position:fixed;bottom:44px;left:10px;z-index:150;width:128px;height:128px;display:none}
.dp{width:42px;height:42px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;border-radius:3px;position:absolute;-webkit-tap-highlight-color:transparent}
#dpU{top:0;left:43px}#dpD{top:86px;left:43px}#dpL{top:43px;left:0}#dpR{top:43px;left:86px}
#dpA{top:43px;left:43px;font-family:'Press Start 2P';font-size:9px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="logo">⚔ GOZO</div>
  <div class="hdv"></div>
  <div id="resbar">
    <div class="res">🪵<b id="rw">0</b></div>
    <div class="res">🪨<b id="rs">0</b></div>
    <div class="res">⚫<b id="rc">0</b></div>
    <div class="res">⚙<b id="rm">0</b></div>
    <div class="res">🌾<b id="rf">0</b></div>
    <div class="res">🥩<b id="rmt">0</b></div>
    <div class="res">💰<b id="rg">0</b></div>
    <div class="res">🧴<b id="rlth">0</b></div>
    <div class="res">🥚<b id="regg">0</b></div>
    <div class="res">🍯<b id="rhny">0</b></div>
  </div>
  <div class="hdv"></div>
  <div class="vp" id="season">🌱 Spring Y1</div>
  <div class="vp" id="timelbl">Day 1</div>
  <div class="hdv"></div>
  <div class="vp" id="wb-toggle" onclick="toggleWorkerPanel()" style="cursor:pointer;user-select:none">
    👥 <span id="pop">0</span>/<span id="cap">0</span> ▾
  </div>
</div>

<!-- WORKER PANEL -->
<div id="wpanel">
  <div id="wpanel-title">
    <span>👷 WORKERS</span>
    <span onclick="toggleWorkerPanel()" style="cursor:pointer;color:#c04040;font-size:8px">✖</span>

</div>

<div id="mm"><canvas id="mmc" width="130" height="100"></canvas></div>

<div id="toolbar">
  <button class="tbtn on" id="tb-walk" onclick="setMode('walk')">👆 WALK</button>
  <button class="tbtn" id="tb-build" onclick="toggleBuildPanel()">🏗 BUILD (B)</button>
  <button class="tbtn" id="tb-road" onclick="setMode('road')">🛤 ROAD</button>
  <button class="tbtn" id="tb-erase" onclick="setMode('erase')">🌿 ERASE</button>
  <button class="tbtn" id="tb-demo" onclick="setMode('demo')">🗑 DEMO</button>
  <div class="hdv"></div>
  <div id="timelbl2" style="font-family:'Press Start 2P';font-size:6px;color:#c09040;padding:2px 6px;background:#100a04;border:1px solid #3a2a10">06:00</div>
  <div class="hdv"></div>
  <button class="tbtn" id="tb-pause" onclick="togglePause()">⏸</button>
  <select id="spd" onchange="G.spd=+this.value" style="background:#100a04;border:1px solid #3a2a10;color:#908060;font-family:'Press Start 2P';font-size:6px;padding:1px 3px;cursor:pointer">
    <option value="1">1×</option><option value="2">2×</option><option value="3">3×</option>
  </select>
  <div class="hdv"></div>
  <button class="tbtn" onclick="centerCam()">🎯</button>
  <div class="hdv"></div>
  <button class="tbtn" id="tb-music" onclick="toggleMusic()" title="Toggle Music">🎵</button>
</div>

<!-- BUILD PANEL -->
<div id="buildpanel">
  <div id="bptabs">
    <button class="bptab on" onclick="swBPTab('house',this)">🏠 HOUSING</button>
    <button class="bptab" onclick="swBPTab('food',this)">🌾 FOOD</button>
    <button class="bptab" onclick="swBPTab('work',this)">⚒ WORK</button>
    <button class="bptab" onclick="swBPTab('civic',this)">🏛 CIVIC</button>
  </div>
  <div id="bpscroll"></div>
</div>

<div id="bldworker">
  <div id="bldworker-title">
    <span id="bldworker-name">👷 WORKERS</span>
    <span onclick="closeBldWorker()" style="cursor:pointer;color:#c04040">✖</span>
  </div>
  <div id="bldworker-info" style="padding:6px 10px;font-size:11px;color:#a09060;border-bottom:1px solid #3a2a10"></div>
  <div id="bldworker-list"></div>
  <div style="padding:6px 10px;font-size:10px;color:#606040;border-top:1px solid #3a2a10">
    Klik nama untuk assign/unassign. Slot kosong = tidak ada pekerja.
  </div>
</div>

<div id="bypanel">
  <div id="bypanel-title">
    <span>🏡 BACKYARD EXTENSION</span>
    <span id="bypanel-housename" style="color:#c0a060"></span>
    <span onclick="closeByPanel()" style="cursor:pointer;color:#c04040">✖</span>
  </div>
  <div id="bylist"></div>
</div>

<div id="dialog">
  <div id="dname"></div>
  <div id="dmsg"></div>
  <div id="dbtns"></div>
</div>
<div id="notifs"></div>

<div id="dpad">
  <div class="dp" id="dpU">▲</div>
  <div class="dp" id="dpD">▼</div>
  <div class="dp" id="dpL">◀</div>
  <div class="dp" id="dpR">▶</div>
  <div class="dp" id="dpA">E</div>
</div>

<script>
'use strict';
// ══════════════════════════════════════════════════════
//  GOZO VILLAGE  —  Sandbox RPG
//  Tile size 64px, world 48×36
//  Autotile terrain, seamless transitions
// ══════════════════════════════════════════════════════

const CV=document.getElementById('c'),X=CV.getContext('2d');
X.imageSmoothingEnabled=false;

// World constants
const TS=64;          // tile size px
const WC=48,WR=36;    // world cols, rows
const WPX=WC*TS,WPY=WR*TS;
const HH=40,BH=40;    // HUD height, bottom bar height

// Camera

// Player
const PL={x:WPX/2,y:WPY/2,vx:0,vy:0,spd:2.8,dir:2,fr:0,ft:0};

// Game state
const G={
  res:{
    // Raw
    wood:80, stone:50, coal:10, iron:0,
    // Food raw
    food:60, meat:0, egg:0, honey:0, berry:0, wheat:0,
    // Processed food
    flour:0, bread:0, ale:0,
    // Material processed
    plank:0, metal:0, leather:0,
    // Goods
    cloth:0, shoe:0, cloak:0, weapon:0, armor:0, beer:0,
    // Economy
    gold:100, wealth:0,
  },
  pop:6,cap:6,happy:80,health:70,
  day:1,hr:6,mn:0,yr:1,season:0,
  seasons:['🌱 Spring','☀ Summer','🍂 Autumn','❄ Winter'],
  paused:false,spd:1,bld:[],nid:1,ticks:0,bldWorkers:{},pending:{},market:{food:{stock:0,variety:0},fuel:{stock:0},clothing:{stock:0,variety:0}},fields:[],farmStats:{totalHarvests:0,failedHarvests:0},
  mode:'walk' // walk | build | road | erase | demo
};
let buildType=null;

// ── TILE TYPES ──
const T={GRASS:0,PATH:1,WATER:2,DIRT:3,STONE_G:4,SAND:5,FOREST:6};

// ── BUILDING DEFS ──
// Buildings that support assigned workers (type -> max workers)
const BLD_WORKERS={
  farm:2, logger:2, quarry:2, coalmine:2, smelter:2,
  market:1, blacksmith:2, hunting:2, sawmill:1, mill:1,
  granary:2, storehouse:2,
  food_stall:1, fuel_stall:1, clothing_stall:1,
};

// ── MARKET SYSTEM ──
// Each stall type: what it sells, what it draws from storage
const STALL_DEFS={
  food_stall:{
    label:'Food Stall', e:'🥘',
    sells:['food','meat','egg','honey'],  // food variety
    drawFrom:'granary',
    need:'food',
  },
  fuel_stall:{
    label:'Fuel Stall', e:'🪵',
    sells:['coal','wood'],
    drawFrom:'storehouse',
    need:'fuel',
  },
  clothing_stall:{
    label:'Clothing Stall', e:'👘',
    sells:['cloth','shoe','cloak'],
    drawFrom:'storehouse',
    need:'clothing',
  },
};

// Market state: stall stock levels (replenished each doProd if worker+goods exist)
if(!G.market) G.market={
  food:{stock:0,variety:0},    // stock 0-100, variety 0-5 (num food types available)
  fuel:{stock:0},
  clothing:{stock:0,variety:0},
};

// ── FARMING SYSTEM ──
// Crop types: what they produce, which season to plant/harvest, chain output
const CROPS={
  wheat:  {e:'🌾',n:'Gandum', plant:0/*spring*/, harvest:2/*autumn*/, output:{wheat:4}, chainTo:'malthouse,bakery', flaxAlt:false},
  barley: {e:'🌿',n:'Barley', plant:0,           harvest:2,           output:{wheat:2}, chainTo:'malthouse',        flaxAlt:false},
  flax:   {e:'🌺',n:'Flax',   plant:0,           harvest:2,           output:{cloth:2}, chainTo:'weaver',           flaxAlt:true},
  fallow: {e:'🟫',n:'Bera',   plant:-1,          harvest:-1,          output:{},        chainTo:'',                 flaxAlt:false},
};
const CROP_ROTATION=['wheat','barley','fallow']; // default rotation

// G.fields: array of field objects {col,row,crop,fertility,growStage,rotation,farmId}
// fertility: 0-100, growStage: 0=empty,1=planted,2=growing,3=ready,4=harvested
if(!G.fields) G.fields=[];
if(!G.farmStats) G.farmStats={totalHarvests:0, failedHarvests:0};

// Season: 0=spring,1=summer,2=autumn,3=winter
function getSeason(){ return G.season||0; }
function seasonName(){ return ['🌱 Spring','☀ Summer','🍂 Autumn','❄ Winter'][getSeason()]; }

// Get fertility of tile (based on proximity to water, natural soil variation)
function getTileFertility(c,r){
  // Base: pseudo-random from tile position
  const base=((Math.sin(c*13.7+r*7.3)*4325)%1+1)%1;
  let fert=40+Math.round(base*40); // 40-80 base
  // Bonus near water
  for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
    if(r+dr>=0&&r+dr<WR&&c+dc>=0&&c+dc<WC&&MAP[r+dr][c+dc].t===T.WATER) fert+=5;
  }
  return Math.min(100,fert);
}

// Dist-based supply: check if a house is within range of marketplace
function nearMarket(houseId){
  const house=G.bld.find(b=>b.id===houseId);
  if(!house) return false;
  const markets=G.bld.filter(b=>b.type==='market');
  if(!markets.length) return false;
  for(const m of markets){
    const dx=house.col-m.col, dy=house.row-m.row;
    if(Math.sqrt(dx*dx+dy*dy)<=8) return true; // 8 tile radius
  }
  return false;
}

// Resources that belong to Granary vs Storehouse
const GRANARY_RES  =['food','meat','egg','honey','beer','berry','wheat','flour','bread','ale'];

// ── WORKFORCE SYSTEM ──
// Max workers per building type (families, not individuals)
// Already defined in BLD_WORKERS but we expand context here

// Get family assigned to a building slot
function getFamilyWorkers(bldId){
  return (G.bldWorkers[bldId]||[]).filter(n=>n);
}

// Get all adults in a family (by houseId)
function getFamilyByHouse(houseId){
  return NPCS.filter(n=>n.houseId===houseId&&isAdult(n));
}

// Is family's house backyard active (locks them to home business)
function isHomeBusiness(houseId){
  const house=G.bld.find(b=>b.id===houseId);
  if(!house||!house.backyard) return false;
  const craftTypes=['smithy','tannery','shoemaker','tailor','brewery','armor'];
  return craftTypes.includes(house.backyard.type);
}

// Worker efficiency: decreases if NPC is far from building
function workerEff(npcName, bldId){
  const npc=NPCS.find(n=>n.name===npcName);
  const bld=G.bld.find(b=>b.id===bldId);
  if(!npc||!bld) return 0;
  const dx=npc.x-(bld.col*TS+TS/2), dy=npc.y-(bld.row*TS+TS/2);
  const dist=Math.sqrt(dx*dx+dy*dy);
  // Full efficiency within 5 tiles, drops to 0.5 at 15 tiles
  return Math.max(0.5, 1-(dist/(TS*15))*0.5);
}

// Get total workforce efficiency for a building
function getBldEfficiency(bldId){
  const workers=getFamilyWorkers(bldId);
  if(!workers.length) return 0;
  return workers.reduce((sum,n)=>sum+workerEff(n,bldId),0)/workers.length;
}

// ── POPULATION CONSTANTS & HELPERS ──
const ADULT_DAYS=1350; // 15 years * 90 days/year
const PREG_DAYS=280;

function isAdult(npc){ return (npc.age||0)>=ADULT_DAYS; }
function getAdults(){ return NPCS.filter(isAdult); }

function upPop(){
  G.pop=getAdults().length;
  const houses=G.bld.filter(b=>b.type==='house');
  G.cap=Math.max(6, houses.length*4);
}

// Population growth: new family moves in if happy + empty house available
function checkPopGrowth(){
  if(G.happy<50) return; // need decent happiness
  const emptyHouses=G.bld.filter(b=>{
    if(b.type!=='house') return false;
    const residents=NPCS.filter(n=>n.houseId===b.id);
    return residents.length===0; // completely empty house
  });
  if(!emptyHouses.length) return;
  if(Math.random()>0.05) return; // 5% chance per doProd
  // New family moves in
  const house=emptyHouses[0];
  const newFamilyId=Math.max(...FAMILIES.map(f=>f.id),-1)+1;
  const maleNames=['Eko','Bima','Dodi','Fandi','Galih','Heri','Iman','Joko'];
  const femNames=['Anis','Citra','Diah','Fitri','Gita','Hani','Ika','Juni'];
  const mName=maleNames[Math.floor(Math.random()*maleNames.length)];
  const fName=femNames[Math.floor(Math.random()*femNames.length)];

// ─── HASH NOISE ───
function hh(x,y){let n=Math.sin(x*127.1+y*311.7)*43758.5;return n-(n|0);}
function sh(c,r){return(hh(c,r)*.4+hh(c+1,r)*.15+hh(c-1,r)*.15+hh(c,r+1)*.15+hh(c,r-1)*.15);}

// ─── WORLD CANVAS (pre-rendered, rebuilt once) ───
let WC_=null; // world canvas

function buildWorld(){
  WC_=document.createElement('canvas');
  WC_.width=WPX; WC_.height=WPY;
  const W=WC_.getContext('2d');

  // Step 1: draw ALL tiles row by row, each with slight overlap
  // Overlap means no gaps/seams between tiles
  const OV=2; // overlap pixels each side
  for(let r=0;r<WR;r++) for(let c=0;c<WC;c++){
    drawTileTexture(W,MAP[r][c].t,c,r,c*TS-OV,r*TS-OV,TS+OV*2,TS+OV*2);
  }

  // Step 2: autotile transitions — draw soft organic border between different tile types
  for(let r=0;r<WR;r++){
    for(let c=0;c<WC;c++){
      const t=MAP[r][c].t;
      autoTileBlend(W,c,r,t);
    }
  }


  // Pass 3: bake trees and rocks onto world canvas (static — no jitter)
  for(let r=0;r<WR;r++){
    for(let c=0;c<WC;c++){
      const tile=MAP[r][c];
      if(!tile.decor)continue;
      const v=hh(c,r);
      const sx=c*TS, sy=r*TS;
      if(tile.decor==='tree'){
        const skipL=c>0&&MAP[r][c-1]&&MAP[r][c-1].decor==='tree';
        const skipU=r>0&&MAP[r-1][c]&&MAP[r-1][c].decor==='tree';
        if(!skipL||!skipU||v>0.55) drawTreeOnCtx(W,sx,sy,v);
      } else if(tile.decor==='rock'){
        drawRockOnCtx(W,sx,sy,v);
      } else if(tile.decor==='bush'){
        drawBushOnCtx(W,sx,sy,v);
      }
    }
  }}

function drawTileTexture(W,type,c,r,sx,sy,tw_=TS,th_=TS){
  const v=sh(c,r), v2=hh(c*3+5,r*2+8), v3=hh(c+50,r+50);
  const g=v*20|0;

  if(type===T.GRASS){
    // Uniform base — same green for ALL grass tiles, no per-tile shade shift
    W.fillStyle='rgb(88,162,54)';
    W.fillRect(sx,sy,tw_,th_);

    // Subtle large-scale variation using low-frequency noise (spans multiple tiles)
    // Use c/4, r/4 so blobs are 4x bigger than one tile — no tile boundary visible
    const lv=hh(Math.floor(c/4)*4, Math.floor(r/4)*4);
    if(lv>0.3){
      W.fillStyle=`rgba(70,140,40,${(lv-0.3)*0.12})`;
      W.fillRect(sx,sy,tw_,th_);
    }

    // Within-tile detail: small organic blobs, flowers, tufts
    // These are INSIDE the tile so they don't affect boundaries
    const b1x=sx+TS*(0.15+v2*0.7), b1y=sy+TS*(0.15+v*0.7);
    W.fillStyle=`rgba(62,138,36,${0.08+v*0.06})`;
    W.beginPath();W.ellipse(b1x,b1y,TS*(0.18+v3*0.14),TS*(0.14+v2*0.12),v*Math.PI,0,Math.PI*2);W.fill();

    // Grass tufts
    if(v>0.3){
      const gx=sx+(hh(c+1,r+2)*(TS-16))|0, gy=sy+(hh(c+3,r+1)*(TS-12))|0;
      W.fillStyle='rgba(38,108,18,0.55)';
      W.fillRect(gx,gy-6,2,6); W.fillRect(gx+6,gy-7,2,7); W.fillRect(gx+12,gy-5,2,5);
    }
    // Flowers
    if(v2>0.76){W.fillStyle='rgba(255,255,255,0.8)';W.fillRect(sx+(hh(c*2,r*2)*(TS-8))|0,sy+(hh(c,r*3)*(TS-8))|0,3,2);}
    if(v3>0.80){W.fillStyle='rgba(255,210,70,0.75)';W.fillRect(sx+(hh(c*4,r)*(TS-7))|0,sy+(hh(c,r*4)*(TS-7))|0,2,2);}
    // Occasional bare soil
    if(v<0.10){
      W.fillStyle='rgba(140,105,52,0.18)';
      W.beginPath();W.ellipse(sx+TS*(0.38+v2*0.24),sy+TS*(0.42+v*0.24),TS*0.1,TS*0.08,v2,0,Math.PI*2);W.fill();
    }

  } else if(type===T.FIELD){
    // Farm field - brown soil
    const fert=getTileFertility(c,r);
    const brown=Math.round(60+fert*.2);
    ctx.fillStyle=`rgb(${brown+20},${brown-10},${brown-30})`;
    ctx.fillRect(sx-OV,sy-OV,TS+OV*2,TS+OV*2);
    // Tilled furrows
    ctx.strokeStyle=`rgba(0,0,0,0.08)`;ctx.lineWidth=1;
    for(let i=8;i<TS;i+=8){ctx.beginPath();ctx.moveTo(sx,sy+i);ctx.lineTo(sx+TS,sy+i);ctx.stroke();}
  } else if(type===T.PATH){
    // Uniform dirt path base
    W.fillStyle='rgb(196,160,92)';
    W.fillRect(sx,sy,tw_,th_);
    // Subtle pebble details within tile
    if((c*5+r*9)%3===0){
      const pv=hh(c*3,r*7);
      W.fillStyle=`rgba(160,130,88,0.5)`;
      W.fillRect(sx+(pv*(TS-6))|0,sy+(hh(c,r*5)*(TS-6))|0,4,2);
    }
    // Organic dirt variation blob (no lines)
    if(v>0.45){
      W.fillStyle=`rgba(0,0,0,${0.03+v2*0.02})`;
      W.beginPath();W.ellipse(sx+TS*(0.2+v2*0.6),sy+TS*(0.2+v*0.6),TS*(0.15+v*0.1),TS*(0.14+v2*0.1),v*Math.PI*2,0,Math.PI*2);W.fill();
    }
  } else if(type===T.WATER){
    // Water — animated each frame, base here
    const wg=v*10|0;
    W.fillStyle=`rgb(${48+wg},${112+wg},${200+wg})`;
    W.fillRect(sx,sy,tw_,th_);
    W.fillStyle=`rgba(20,70,160,${0.1+v2*0.08})`;
    W.beginPath();W.ellipse(sx+TS*(0.35+v*0.3),sy+TS*(0.35+v2*0.3),TS*0.26+v*8,TS*0.2+v2*6,v*2,0,Math.PI*2);W.fill();

  } else if(type===T.DIRT){
    // Rich brown dirt
    const dg=v*18|0;
    W.fillStyle=`rgb(${148+dg},${108+dg},${58+dg})`;
    W.fillRect(sx,sy,tw_,th_);
    // Tilled rows
    W.strokeStyle=`rgba(0,0,0,0.1)`;W.lineWidth=1;
    for(let i=8;i<TS;i+=10){W.beginPath();W.moveTo(sx,sy+i);W.lineTo(sx+TS,sy+i);W.stroke();}

  } else if(type===T.STONE_G){
    // Rocky ground
    const sg=v*20|0;
    W.fillStyle=`rgb(${118+sg},${112+sg},${98+sg})`;
    W.fillRect(sx,sy,tw_,th_);
    W.fillStyle=`rgba(255,255,255,0.04)`;W.fillRect(sx,sy,TS,TS*0.35);
    // Mineral streak (diagonal, never horizontal/vertical)
    W.strokeStyle=`rgba(155,152,138,0.32)`;W.lineWidth=1.5+v*2;
    W.beginPath();W.moveTo(sx+TS*(0.1+v2*0.2),sy+TS*(0.15+v*0.1));W.lineTo(sx+TS*(0.65+v*0.22),sy+TS*(0.75+v2*0.18));W.stroke();
    // Lichen
    if(v>0.55){W.fillStyle=`rgba(80,112,52,${(v-0.55)*0.38})`;W.beginPath();W.ellipse(sx+TS*(0.4+v2*0.3),sy+TS*(0.35+v*0.3),TS*0.16+v*4,TS*0.13+v*3,v*Math.PI,0,Math.PI*2);W.fill();}

  } else if(type===T.SAND){
    const sg=v*14|0;
    W.fillStyle=`rgb(${210+sg},${185+sg},${130+sg})`;
    W.fillRect(sx,sy,tw_,th_);
    W.fillStyle=`rgba(255,255,255,0.06)`;W.fillRect(sx,sy,tw_,th_*0.3);
  }
}

// Autotile: for each tile boundary with a DIFFERENT neighbour type,
// draw an organic soft bleed of that neighbour's colour
function autoTileBlend(W,c,r,t){
  // Only blend for non-path, non-building tiles
  // PATH tiles stay as clean rectangles — no blob edges
  if(t===T.PATH||t===T.WATER) return;
  if(MAP[r][c].bld) return;

  const v=sh(c,r), v2=hh(c*2+7,r*3+3);
  const sx=c*TS, sy=r*TS;
  const myCol=getBaseColor(t,0);

  const dirs=[[c+1,r,1,0],[c-1,r,-1,0],[c,r+1,0,1],[c,r-1,0,-1]];
  for(const[nc,nr,dx,dy]of dirs){
    if(nc<0||nc>=WC||nr<0||nr>=WR)continue;
    const nt=MAP[nr][nc].t;
    if(nt===t||nt===T.PATH) continue; // don't blend toward PATH
    if(MAP[nr][nc].bld) continue;

    const nv=sh(nc,nr);
    const nCol=getBaseColor(nt,0);
    const warp=(v-.5)*10, w2=(v2-.5)*10;
    const b=TS*(0.16+v*0.05);

    W.fillStyle=nCol;
    if(dx===1)       { W.beginPath();W.ellipse(sx+TS-2, sy+TS*(0.3+v*0.4)+warp, b, TS*(0.28+v2*0.12), v*.15, 0, Math.PI*2);W.fill(); }
    else if(dx===-1) { W.beginPath();W.ellipse(sx+2,    sy+TS*(0.3+v2*0.4)+w2,  b, TS*(0.28+v*.12),  -v2*.15,0, Math.PI*2);W.fill(); }
    else if(dy===1)  { W.beginPath();W.ellipse(sx+TS*(0.3+v*0.4)+warp, sy+TS-2, TS*(0.28+v2*0.12), b, v*.15, 0, Math.PI*2);W.fill(); }
    else if(dy===-1) { W.beginPath();W.ellipse(sx+TS*(0.3+v2*0.4)+w2, sy+2,     TS*(0.28+v*.12),  b, -v2*.15,0, Math.PI*2);W.fill(); }
  }
}

function getBaseColor(type,g){
  if(type===T.GRASS)return`rgb(${84+g},${164+g},${52+g})`;
  if(type===T.PATH)return`rgb(${192+g},${158+g},${90+g})`;
  if(type===T.WATER)return`rgb(${48+g},${112+g},${200+g})`;
  if(type===T.DIRT)return`rgb(${148+g},${108+g},${58+g})`;
  if(type===T.STONE_G)return`rgb(${118+g},${112+g},${98+g})`;
  if(type===T.FOREST)return`rgb(${34+g},${72+g},${20+g})`;
  return`rgb(${210+g},${185+g},${130+g})`;
}

// animated water — only repaints water tiles
function animateWater(){
  if(!WC_)return;
  const W=WC_.getContext('2d');
  const t=Date.now()/1000;
  for(let r=0;r<WR;r++) for(let c=0;c<WC;c++){
    if(MAP[r][c].t!==T.WATER)continue;
    const v=sh(c,r),g=v*10|0,sx=c*TS,sy=r*TS;
    const w=Math.sin(t*0.9+c*0.5+r*0.4);
    W.fillStyle=`rgb(${48+g+(w*3|0)},${112+g+(w*5|0)},${200+g+(w*2|0)})`;
    W.fillRect(sx,sy,TS,TS);
    W.fillStyle=`rgba(20,70,160,${0.08+sh(c,r)*0.07})`;
    W.beginPath();W.ellipse(sx+TS*(0.35+v*0.3),sy+TS*(0.35+sh(c,r)*0.3),TS*0.26+v*8,TS*0.2+v*6,v*2,0,Math.PI*2);W.fill();
    const ry=((t*22+r*TS)%TS)|0;
    W.fillStyle='rgba(175,225,255,0.13)';W.fillRect(sx,sy+ry,TS,2);
    W.fillRect(sx,sy+(ry+TS/2|0)%TS,TS,1);
  }
}

// ─── GEN MAP ───
function rng(seed){let s=seed;return()=>{s=Math.sin(s*9301+49297)*233280;return s-(s|0);};}
const R=rng(42);

function genMap(){
  MAP=[];
  for(let r=0;r<WR;r++){MAP[r]=[];for(let c=0;c<WC;c++)MAP[r][c]={t:T.GRASS,bld:null,decor:null};}

  const mc=WC/2|0, mr=WR/2|0;

  // No pre-built roads — player builds their own paths

  // river (left side)
  for(let r=3;r<WR-3;r++){
    MAP[r][3].t=T.WATER; MAP[r][4].t=T.WATER;
    if(r%5===0){MAP[r][2].t=T.WATER; MAP[r][5].t=T.WATER;}
    if(r%7===0) MAP[r][5].t=T.WATER;
  }

  // ── FOREST ECOSYSTEM — dense forest zones in corners/edges ──
  const forestZones=[
    {c:2,  r:2,   w:8, h:10}, // left forest strip (near river)
    {c:36, r:2,   w:10,h:14}, // top-right forest
    {c:34, r:22,  w:12,h:12}, // bottom-right forest
    {c:8,  r:24,  w:8, h:10}, // bottom-left forest
  ];
  for(const fz of forestZones){
    for(let dr=0;dr<fz.h;dr++) for(let dc=0;dc<fz.w;dc++){
      const fr=fz.r+dr, fc=fz.c+dc;
      if(fr<0||fr>=WR||fc<0||fc>=WC)continue;
      if(MAP[fr][fc].t===T.PATH||MAP[fr][fc].t===T.WATER)continue;
      MAP[fr][fc].t=T.FOREST;
      // dense tree coverage in forest zones
      const fv=R();
      if(fv>0.15) MAP[fr][fc].decor='tree';
      else if(fv>0.05) MAP[fr][fc].decor='bush';
    }
  }

  // stone patches
  for(let i=0;i<6;i++){
    const sc2=6+R()*( WC-12)|0, sr=3+R()*(WR-6)|0;
    for(let dr=-1;dr<=2;dr++) for(let dc=-1;dc<=2;dc++){

        MAP[sr+dr][sc2+dc].t=T.STONE_G;

    if(n>.88) MAP[r][c].decor='tree';

const TW=TS;

function LN(x1,y1,x2,y2,c,lw=1){X.strokeStyle=c;X.lineWidth=lw;X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();}

// Window: simple recessed pixel art
function WIN(x,y,w,h){
  FR(x,y,w,h,'#1c2840');
  FR(x+1,y+1,w-2,h-2,'#4898c8');
  FR(x+1,y+1,Math.floor((w-2)/2),2,'rgba(255,255,255,0.55)');
  LN(x+Math.floor(w/2),y+1,x+Math.floor(w/2),y+h-1,'rgba(0,0,0,0.2)');
  LN(x+1,y+Math.floor(h/2),x+w-1,y+Math.floor(h/2),'rgba(0,0,0,0.2)');
}

// Animated smoke puffs
function SMOKE(sx,sy,n=3){
  const t=Date.now()/700;
  for(let i=0;i<n;i++){
    const a=0.28-i*0.08;
    X.fillStyle=`rgba(210,210,210,${a})`;
    X.beginPath();X.arc(sx+Math.sin(t*0.8+i*1.3)*3,sy-i*9-4,5+i*2,0,Math.PI*2);X.fill();
  }
}

// Thatched/bamboo roof — layered horizontal bands
function THATCH_ROOF(cx,wy,W,H,col='#c8a020',dark='#8a6810'){
  // Base triangle
  X.fillStyle=col;
  X.beginPath();X.moveTo(cx-W/2-5,wy);X.lineTo(cx+W/2+5,wy);X.lineTo(cx,wy-H);X.closePath();X.fill();
  // Dark side
  X.fillStyle=dark;
  X.beginPath();X.moveTo(cx,wy-H);X.lineTo(cx+W/2+5,wy);X.lineTo(cx+W/2,wy);X.closePath();X.fill();
  // Thatching lines (horizontal bands)
  const bands=4;
  for(let i=1;i<bands;i++){
    const t=i/bands;
    const lx=cx-W/2*t-5*t, rx=cx+W/2*t+5*t, ly=wy-H*t;
    X.strokeStyle=`rgba(0,0,0,${0.1+i*0.04})`;X.lineWidth=1.5;
    X.beginPath();X.moveTo(lx,ly);X.lineTo(rx,ly);X.stroke();
    X.strokeStyle=`rgba(255,255,255,0.08)`;X.lineWidth=1;
    X.beginPath();X.moveTo(lx,ly+2);X.lineTo(rx,ly+2);X.stroke();
  }
  // Ridge cap
  FR(cx-4,wy-H-2,8,5,dark);
}

// Bamboo/wood wall with plank texture
function WALL(cx,wy,W,H,col='#d4a868'){
  FR(cx-W/2,wy,W,H,col);
  // Top highlight
  FR(cx-W/2,wy,W,4,`rgba(255,255,255,0.12)`);
  // Plank lines
  X.strokeStyle='rgba(0,0,0,0.08)';X.lineWidth=1;
  for(let i=10;i<H;i+=10){
    X.beginPath();X.moveTo(cx-W/2+1,wy+i);X.lineTo(cx+W/2-1,wy+i);X.stroke();
  }
  // Vertical corner posts (kayu/bamboo)
  FR(cx-W/2,wy,4,H,'rgba(0,0,0,0.12)');
  FR(cx+W/2-4,wy,4,H,'rgba(0,0,0,0.1)');
  // Right shadow
  FR(cx+W/2-2,wy+2,2,H-2,'rgba(0,0,0,0.15)');
}

// Door: traditional wooden door
function DOOR(cx,bot,w=14,h=22){
  const x=cx-w/2, y=bot-h;
  FR(x,y,w,h,'#7a4010');
  FR(x+1,y+2,w/2-2,h*0.4|0,'rgba(0,0,0,0.2)');

}

// ── RUMAH DESA (village house) — referensi: rumah putih atap genteng ──
function bHouse(cx,bot,lv){
  const W=76+lv*8, H=52+lv*5, wy=bot-H-20;

  // ── TERAS (porch) — flush dengan dinding ──
  const pW=W*0.55|0, pH=14, px2=cx, py2=bot-pH;
  // Lantai teras (warna sedikit berbeda, tapi flush di bawah)
  FR(px2-pW/2, bot-pH, pW, pH, '#d4c8b0');
  FR(px2-pW/2, bot-pH, pW, 2, 'rgba(255,255,255,0.15)');
  // Tiang teras kiri & kanan (memanjang dari wy sampai bot)
  FR(px2-pW/2+3, wy, 6, H+pH, '#e8e0d0');
  FR(px2+pW/2-9, wy, 6, H+pH, '#e8e0d0');
  // Atap teras (overhang)
  const oW=pW+12;
  X.fillStyle='#7a3e18';
  X.beginPath();X.moveTo(px2-oW/2,wy);X.lineTo(px2+oW/2,wy);X.lineTo(px2+oW/2,wy+10);X.lineTo(px2-oW/2,wy+10);X.closePath();X.fill();
  for(let i=0;i<3;i++){
    X.fillStyle=i%2===0?'#8a4820':'#6e3410';
    X.fillRect(Math.round(px2-oW/2),Math.round(wy+i*3+1),Math.round(oW),3);
  }

  // ── DINDING UTAMA — putih/krem ──
  FR(cx-W/2, wy, W, H+pH, '#e8e0d0'); // wall extends to cover porch area
  FR(cx-W/2, wy, W, 4, 'rgba(255,255,255,0.18)'); // top highlight
  FR(cx+W/2-3, wy, 3, H+pH, 'rgba(0,0,0,0.08)');
  FR(cx-W/2, wy+H+pH-3, W, 3, 'rgba(0,0,0,0.1)');
  // Plester texture — halus, bukan kayu
  X.fillStyle='rgba(0,0,0,0.025)';
  for(let i=16;i<H+pH;i+=16) X.fillRect(Math.round(cx-W/2+1),Math.round(wy+i),Math.round(W-2),1);



  // ── JENDELA BESAR (kiri) ──
  const wx1=cx-W/2+10, wy1=wy+12, ww=18, wh=16;
  FR(wx1-2,wy1-2,ww+4,wh+4,'#c8b898');  // frame
  FR(wx1,wy1,ww,wh,'#1c2e48');           // glass dark
  FR(wx1+1,wy1+1,ww-2,wh-2,'#4898c8');  // glass
  FR(wx1+1,wy1+1,(ww-2)/2,4,'rgba(255,255,255,0.55)'); // glare
  LN(wx1+ww/2,wy1+1,wx1+ww/2,wy1+wh-1,'rgba(0,0,0,0.2)');
  LN(wx1+1,wy1+wh/2,wx1+ww-1,wy1+wh/2,'rgba(0,0,0,0.2)');
  // Kusen putih


  // ── JENDELA KANAN (lv>=2) ──
  if(lv>=2){
    const wx2=cx+W/2-28, wy2=wy+12;
    FR(wx2-2,wy2-2,ww+4,wh+4,'#c8b898');
    FR(wx2,wy2,ww,wh,'#1c2e48');
    FR(wx2+1,wy2+1,ww-2,wh-2,'#4898c8');
    FR(wx2+1,wy2+1,(ww-2)/2,4,'rgba(255,255,255,0.55)');
    LN(wx2+ww/2,wy2+1,wx2+ww/2,wy2+wh-1,'rgba(0,0,0,0.2)');
    LN(wx2+1,wy2+wh/2,wx2+ww-1,wy2+wh/2,'rgba(0,0,0,0.2)');

  }

  // ── PINTU KAYU COKLAT — center, proporsional ──
  const dw=20, dh=30, dx2=cx-dw/2, dy2=bot-pH-dh;
  // Frame kusen
  FR(dx2-2, dy2-2, dw+4, dh+2, '#c8a870');
  // Pintu
  FR(dx2, dy2, dw, dh, '#8a4c14');
  // Top arch hint
  FR(dx2, dy2, dw, 4, '#7a3c08');
  // Panel atas kiri
  FR(dx2+2, dy2+5, dw/2-4, dh*0.32, 'rgba(0,0,0,0.16)');
  FR(dx2+dw/2+2, dy2+5, dw/2-4, dh*0.32, 'rgba(0,0,0,0.12)');
  // Panel bawah kiri
  FR(dx2+2, dy2+dh*0.46, dw/2-4, dh*0.44, 'rgba(0,0,0,0.12)');
  FR(dx2+dw/2+2, dy2+dh*0.46, dw/2-4, dh*0.44, 'rgba(0,0,0,0.09)');
  // Garis tengah pintu
  LN(cx, dy2, cx, dy2+dh, 'rgba(0,0,0,0.18)', 1);
  // Handle
  FR(dx2+dw-7, dy2+dh/2-3, 3, 6, '#d4a820');
  FR(dx2+dw-8, dy2+dh/2-1, 5, 3, '#b88010');

  // ── ATAP GENTENG (tiled roof) ──
  const rH=28+lv*4, rW=W+16;
  // Base atap
  X.fillStyle='#8a3e18';
  X.beginPath();X.moveTo(cx-rW/2,wy);X.lineTo(cx+rW/2,wy);X.lineTo(cx,wy-rH);X.closePath();X.fill();
  // Shadow sisi kanan
  X.fillStyle='#6a2e10';
  X.beginPath();X.moveTo(cx,wy-rH);X.lineTo(cx+rW/2,wy);X.lineTo(cx+rW/2-4,wy);X.closePath();X.fill();
  // Genteng — garis horizontal berlapis
  const bands=6+lv;
  for(let i=1;i<bands;i++){
    const t=i/bands;
    const lx=cx-rW/2*t, rx=cx+rW/2*t, ly=wy-rH*t;
    // Garis gelap (lekukan genteng)
    X.strokeStyle=`rgba(0,0,0,${0.15+i*0.02})`;X.lineWidth=1.5;
    X.beginPath();X.moveTo(lx,ly);X.lineTo(rx,ly);X.stroke();
    // Garis terang (tonjolan genteng)
    X.strokeStyle='rgba(255,255,255,0.1)';X.lineWidth=1;
    X.beginPath();X.moveTo(lx,ly+2);X.lineTo(rx,ly+2);X.stroke();
  }
  // Ridge cap (bubungan)
  FR(cx-5,wy-rH-3,10,7,'#6a2e10');
  FR(cx-3,wy-rH-4,6,3,'#7a3818');

  // ── LAMPU TERAS (animated warm glow) ──
  const lt=Date.now()/1200;
  const glow=0.65+Math.sin(lt)*0.1;
  // Lampu kiri teras
  X.fillStyle=`rgba(255,${200+Math.sin(lt)*20|0},80,${glow})`;
  X.beginPath();X.arc(px2-pW/2+14,wy+4,5,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,220,120,0.3)';
  X.beginPath();X.arc(px2-pW/2+14,wy+6,10,0,Math.PI*2);X.fill();
  // Lampu kanan teras
  X.fillStyle=`rgba(255,${200+Math.sin(lt+1)*20|0},80,${glow})`;
  X.beginPath();X.arc(px2+pW/2-14,wy+4,5,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,220,120,0.3)';
  X.beginPath();X.arc(px2+pW/2-14,wy+6,10,0,Math.PI*2);X.fill();

  // ── BANGKU TERAS (bench) ──
  if(lv>=1){
    FR(cx+pW/2-20,bot-12,16,4,'#9a6830');  // seat
    FR(cx+pW/2-20,bot-16,2,8,'#7a5020');   // leg L
    FR(cx+pW/2-6, bot-16,2,8,'#7a5020');   // leg R
    FR(cx+pW/2-20,bot-18,16,3,'#9a6830');  // backrest

  // ── TANAMAN HIAS di samping pintu ──
  X.fillStyle='#4a7818';X.beginPath();X.arc(cx-pW/2+8,bot-10,5,Math.PI,0);X.fill();
  FR(cx-pW/2+5,bot-10,6,6,'#7a5020');
}

// ── LADANG (farm) ──
function bFarm(cx,bot,lv){
  const fw=80,fh=55,fy=bot-fh;
  // Soil bed
  FR(cx-fw/2,fy,fw,fh,'#6a4010');
  FR(cx-fw/2,fy,fw,4,'rgba(255,255,255,0.06)');
  // Furrow rows
  const rows=3+lv;
  for(let i=0;i<=rows;i++){
    const y=fy+i*(fh/rows);
    FR(cx-fw/2,y,fw,2,'#7a5020');
    X.strokeStyle='rgba(0,0,0,0.08)';X.lineWidth=1;
    X.beginPath();X.moveTo(cx-fw/2,y);X.lineTo(cx+fw/2,y);X.stroke();
  }
  // Crops (animated growth bob)

  for(let row=0;row<rows;row++){
    for(let col=0;col<5;col++){
      const px=cx-fw/2+8+col*15, py=fy+6+row*(fh/rows);

      X.fillStyle='#38b824';X.beginPath();X.arc(px-1,py-2+bob,3.5,0,Math.PI*2);X.fill();
      X.fillStyle='#50d030';X.beginPath();X.arc(px-1,py-4+bob,2,0,Math.PI*2);X.fill();
    }

  // Scarecrow / small hut
  FR(cx-10,bot-28,20,16,'#c8a040');
  THATCH_ROOF(cx,bot-28,20,12,'#b89020','#806010');
  DOOR(cx,bot-12,8,14);

  for(let i=0;i<7;i++){FR(cx-fw/2+i*12+1,bot-8,3,8,'#a07840');}
}

// ─── PLAYER ───
// ─── DRAW DEER ───
function drawDeer(deer){
  if(!deer.alive)return;
  const px=Math.round(deer.x+camX), py=Math.round(deer.y+camY);
  if(px<-80||px>CV.width+80||py<-80||py>CV.height+80)return;
  const moving=!!(deer.vx||deer.vy), f=deer.fr||0, dir=deer.dir||2;
  const bob=moving&&f%2===0?-1.5:0;
  const lg=moving?(f%4<2?4:-4):0;

  const body='#c8904a', dark='#9a6828', leg='#7a4a18', nose='#b05030';

  // Shadow
  X.fillStyle='rgba(0,0,0,0.2)';X.beginPath();X.ellipse(px+2,py+8,16,5,0,0,Math.PI*2);X.fill();

  // dir: 0=up, 1=right, 2=down, 3=left
  if(dir===1||dir===3){
    // ── SIDE VIEW (left/right) ──
    const facing=dir===1?1:-1;
    // Legs
    X.fillStyle=leg;
    X.fillRect(px-8+lg,  py+bob,    4,14);
    X.fillRect(px-2,     py+bob,    4,14);
    X.fillRect(px+3-lg,  py+bob,    4,14);
    X.fillRect(px+9,     py+bob,    4,14);
    X.fillStyle='#3a2008';
    X.fillRect(px-8+lg,  py+bob+12,4,3);X.fillRect(px-2,py+bob+12,4,3);
    X.fillRect(px+3-lg,  py+bob+12,4,3);X.fillRect(px+9,py+bob+12,4,3);
    // Body
    X.fillStyle=body;X.beginPath();X.ellipse(px+2,py-8+bob,18,11,0,0,Math.PI*2);X.fill();
    X.fillStyle=dark;X.beginPath();X.ellipse(px+5,py-11+bob,11,6,0,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,235,200,0.55)';X.beginPath();X.ellipse(px-1,py-6+bob,9,5,0,0,Math.PI*2);X.fill();
    // Tail
    if(dir===1){X.fillStyle='#f4ede0';X.beginPath();X.arc(px-14,py-8+bob,5,0,Math.PI*2);X.fill();}
    else       {X.fillStyle='#f4ede0';X.beginPath();X.arc(px+16,py-8+bob,5,0,Math.PI*2);X.fill();}
    // Neck
    X.fillStyle=body;X.beginPath();X.ellipse(px+facing*6,py-12+bob,5,9,facing*0.3,0,Math.PI*2);X.fill();
    // Head
    const hx=px+facing*12, hy=py-18+bob;
    X.fillStyle=body;X.beginPath();X.ellipse(hx,hy,10,8,0,0,Math.PI*2);X.fill();
    X.fillStyle=dark;X.beginPath();X.ellipse(hx+facing*5,hy+2,6,5,0,0,Math.PI*2);X.fill();
    X.fillStyle=nose;X.beginPath();X.arc(hx+facing*9,hy+3,2.5,0,Math.PI*2);X.fill();
    X.fillStyle='#151010';X.beginPath();X.arc(hx+facing*2,hy-3,2.5,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,255,255,0.5)';X.beginPath();X.arc(hx+facing*1,hy-4,1,0,Math.PI*2);X.fill();
    // Ear
    X.fillStyle=body;X.beginPath();X.ellipse(hx-facing*2,hy-9,3,6,facing*0.4,0,Math.PI*2);X.fill();
    X.fillStyle='#f0b890';X.beginPath();X.ellipse(hx-facing*2,hy-9,1.5,4,facing*0.4,0,Math.PI*2);X.fill();
    // Antlers (male)
    if(DEER.indexOf(deer)%2===0){
      X.strokeStyle='#7a4a10';X.lineWidth=2;
      const ax=hx-facing*2, ay=hy-13;
      X.beginPath();X.moveTo(ax,ay);X.lineTo(ax+facing*6,ay-10);X.stroke();
      X.beginPath();X.moveTo(ax+facing*3,ay-5);X.lineTo(ax+facing*8,ay-7);X.stroke();
      X.beginPath();X.moveTo(ax+facing*6,ay-10);X.lineTo(ax+facing*4,ay-16);X.stroke();
      X.beginPath();X.moveTo(ax+facing*6,ay-10);X.lineTo(ax+facing*10,ay-14);X.stroke();
    }

  } else if(dir===2){
    // ── FRONT VIEW (facing player) ──
    // Legs (spread)
    X.fillStyle=leg;
    X.fillRect(px-10+lg,py+bob,4,13); X.fillRect(px-4,py+bob,4,13);
    X.fillRect(px+2-lg, py+bob,4,13); X.fillRect(px+8,py+bob,4,13);
    X.fillStyle='#3a2008';
    X.fillRect(px-10+lg,py+bob+11,4,3);X.fillRect(px-4,py+bob+11,4,3);
    X.fillRect(px+2-lg, py+bob+11,4,3);X.fillRect(px+8,py+bob+11,4,3);
    // Body (round from front)
    X.fillStyle=body;X.beginPath();X.ellipse(px+1,py-8+bob,13,11,0,0,Math.PI*2);X.fill();
    X.fillStyle=dark;X.beginPath();X.ellipse(px+1,py-12+bob,10,7,0,0,Math.PI*2);X.fill();
    // Head
    X.fillStyle=body;X.beginPath();X.ellipse(px+1,py-20+bob,9,9,0,0,Math.PI*2);X.fill();
    X.fillStyle=dark;X.beginPath();X.ellipse(px+1,py-16+bob,6,5,0,0,Math.PI*2);X.fill();
    // Nose
    X.fillStyle=nose;X.fillRect(px-3,py-14+bob,6,3);
    X.fillStyle='#3a1008';X.beginPath();X.arc(px-2,py-13+bob,1.5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(px+2,py-13+bob,1.5,0,Math.PI*2);X.fill();
    // Eyes
    X.fillStyle='#151010';X.beginPath();X.arc(px-5,py-22+bob,2.5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(px+6,py-22+bob,2.5,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,255,255,0.5)';
    X.beginPath();X.arc(px-4,py-23+bob,1,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(px+7,py-23+bob,1,0,Math.PI*2);X.fill();
    // Ears (side)
    X.fillStyle=body;X.beginPath();X.ellipse(px-10,py-22+bob,3,6,-0.3,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(px+11,py-22+bob,3,6,0.3,0,Math.PI*2);X.fill();
    X.fillStyle='#f0b890';X.beginPath();X.ellipse(px-10,py-22+bob,1.5,3.5,-0.3,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(px+11,py-22+bob,1.5,3.5,0.3,0,Math.PI*2);X.fill();
    // Antlers (male)
    if(DEER.indexOf(deer)%2===0){
      X.strokeStyle='#7a4a10';X.lineWidth=2;
      X.beginPath();X.moveTo(px-4,py-28+bob);X.lineTo(px-8,py-36+bob);X.stroke();
      X.beginPath();X.moveTo(px-8,py-36+bob);X.lineTo(px-12,py-33+bob);X.stroke();
      X.beginPath();X.moveTo(px-8,py-36+bob);X.lineTo(px-6,py-40+bob);X.stroke();
      X.beginPath();X.moveTo(px+4,py-28+bob);X.lineTo(px+8,py-36+bob);X.stroke();
      X.beginPath();X.moveTo(px+8,py-36+bob);X.lineTo(px+12,py-33+bob);X.stroke();
      X.beginPath();X.moveTo(px+8,py-36+bob);X.lineTo(px+6,py-40+bob);X.stroke();
    }

  } else {
    // ── BACK VIEW (dir===0, away from player) ──
    X.fillStyle=leg;
    X.fillRect(px-10+lg,py+bob,4,13); X.fillRect(px-4,py+bob,4,13);
    X.fillRect(px+2-lg, py+bob,4,13); X.fillRect(px+8,py+bob,4,13);
    X.fillStyle='#3a2008';
    X.fillRect(px-10+lg,py+bob+11,4,3);X.fillRect(px-4,py+bob+11,4,3);
    X.fillRect(px+2-lg, py+bob+11,4,3);X.fillRect(px+8,py+bob+11,4,3);
    // Body (back view — slightly narrower)
    X.fillStyle=body;X.beginPath();X.ellipse(px+1,py-8+bob,12,11,0,0,Math.PI*2);X.fill();
    X.fillStyle=dark;X.beginPath();X.ellipse(px+1,py-12+bob,9,7,0,0,Math.PI*2);X.fill();
    // White rump patch
    X.fillStyle='#f4ede0';X.beginPath();X.ellipse(px+1,py-7+bob,7,6,0,0,Math.PI*2);X.fill();
    // White tail (prominent from back)
    X.fillStyle='#f8f4ee';X.beginPath();X.arc(px+1,py-6+bob,6,0,Math.PI*2);X.fill();
    // Head (small, far away)
    X.fillStyle=body;X.beginPath();X.ellipse(px+1,py-20+bob,8,8,0,0,Math.PI*2);X.fill();
    X.fillStyle=dark;X.beginPath();X.ellipse(px+1,py-22+bob,6,5,0,0,Math.PI*2);X.fill();
    // Ears
    X.fillStyle=body;X.beginPath();X.ellipse(px-8,py-23+bob,3,6,0.2,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(px+9,py-23+bob,3,6,-0.2,0,Math.PI*2);X.fill();
    // Antlers (male)
    if(DEER.indexOf(deer)%2===0){
      X.strokeStyle='#7a4a10';X.lineWidth=2;
      X.beginPath();X.moveTo(px-3,py-26+bob);X.lineTo(px-7,py-34+bob);X.stroke();
      X.beginPath();X.moveTo(px-7,py-34+bob);X.lineTo(px-11,py-31+bob);X.stroke();
      X.beginPath();X.moveTo(px-7,py-34+bob);X.lineTo(px-5,py-38+bob);X.stroke();
      X.beginPath();X.moveTo(px+3,py-26+bob);X.lineTo(px+7,py-34+bob);X.stroke();
      X.beginPath();X.moveTo(px+7,py-34+bob);X.lineTo(px+11,py-31+bob);X.stroke();
      X.beginPath();X.moveTo(px+7,py-34+bob);X.lineTo(px+5,py-38+bob);X.stroke();
    }
  }

  // Hunt indicator
  const ddx=PL.x-deer.x, ddy=PL.y-deer.y;
  if(Math.sqrt(ddx*ddx+ddy*ddy)<TS*1.6){
    X.fillStyle='rgba(220,40,10,0.88)';
    X.beginPath();X.roundRect(px-16,py-44,32,13,3);X.fill();
    X.fillStyle='#fff';X.font='5px "Press Start 2P"';X.textAlign='center';
    X.fillText('🏹 HUNT',px,py-34);
  }
}

// ─── UPDATE DEER ───
function updateDeer(){
  const now=Date.now();
  for(const deer of DEER){
    if(!deer.alive){
      if(now>deer.respawnT){
        // respawn in a forest zone
        const zones=[[3,3,8,10],[36,2,10,14],[34,22,12,12],[8,24,8,10]];
        const z=zones[Math.floor(Math.random()*zones.length)];
        deer.x=(z[0]+Math.random()*z[2])*TS;
        deer.y=(z[1]+Math.random()*z[3])*TS;
        deer.alive=true; deer.vx=0; deer.vy=0;
      }
      continue;
    }
    // Flee from player if close
    const dx=PL.x-deer.x, dy=PL.y-deer.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<TS*3&&dist>0){
      // run away
      deer.vx=(-dx/dist)*1.8; deer.vy=(-dy/dist)*1.8;
    } else {
      // wander
      deer.wt=(deer.wt||0)+1;
      if(deer.wt>120+Math.floor(deer.x)%80){
        deer.wt=0;
        if(Math.random()<0.35){deer.vx=0;deer.vy=0;}
        else{
          const a=Math.random()*Math.PI*2;
          deer.vx=Math.cos(a)*0.9; deer.vy=Math.sin(a)*0.9;
        }
      }
    }
    if(deer.vx||deer.vy){
      const nx=deer.x+deer.vx, ny=deer.y+deer.vy;
      const c=Math.floor(nx/TS), r=Math.floor(ny/TS);
      // deer only walks in FOREST tiles
      if(c>=0&&c<WC&&r>=0&&r<WR&&MAP[r][c].t===T.FOREST&&!MAP[r][c].bld){
        deer.x=nx; deer.y=ny;
      } else { deer.vx=-deer.vx; deer.vy=-deer.vy; }
      if(deer.vx<-0.3)deer.dir=3; else if(deer.vx>0.3)deer.dir=1;
      if(deer.vy<-0.3)deer.dir=0; else if(deer.vy>0.3)deer.dir=2;
      deer.ft=(deer.ft||0)+1;
      if(deer.ft>6){deer.ft=0;deer.fr=(deer.fr||0)+1;}
    } else {deer.fr=0;deer.ft=0;}
  }
}

// ─── HUNT DEER ───
function tryHunt(){
  const huntRange=TS*1.6;
  for(const deer of DEER){
    if(!deer.alive)continue;
    const dx=PL.x-deer.x, dy=PL.y-deer.y;
    if(Math.sqrt(dx*dx+dy*dy)<huntRange){
      deer.alive=false;
      deer.respawnT=Date.now()+60000*(2+Math.random()*2); // respawn 2-4 min
      const meat=2+Math.floor(Math.random()*3);
      G.res.meat=(G.res.meat||0)+meat;
      G.res.food=(G.res.food||0)+meat; // meat also counts as food
      updateUI();
      notify(`🏹 Deer hunted! +${meat} meat (also +${meat} food)`,'ok');
      return true;
    }
  }
  return false;
}

function drawNPC(npc){
  const px=Math.round(npc.x+camX), py=Math.round(npc.y+camY);
  if(px<-80||px>CV.width+80||py<-100||py>CV.height+100)return;

  const isChild=!isAdult(npc);
  const childScale=isChild?Math.max(0.45, npc.age/ADULT_DAYS*0.55+0.45):1;
  const isPreg=npc.pregnant>0;

  // Scale canvas for children
  if(isChild){
    X.save();
    X.translate(px, py+5*(1-childScale));
    X.scale(childScale, childScale);
    X.translate(-px, -(py+5*(1-childScale)));
  }

  const idx=NPCS.indexOf(npc);
  // Adults use their family style, children get simpler look
  const styleIdx=isChild?(npc.female?1:0):Math.min(idx,NPC_STYLES.length-1);
  const style=NPC_STYLES[styleIdx]||NPC_STYLES[0];
  const dir=npc.dir||2;
  const moving=!!(npc._dx||npc._dy);
  const working=!!npc._working&&!isChild;
  const f=npc._fr||0;
  const t=Date.now()/1000;

  // Animation values
  // Walking: leg swing + body bob
  const walkBob = moving && f%2===0 ? -1 : 0;
  const walkLg  = moving ? (f%4<2 ? 3 : -3) : 0;
  // Working: body leans + arm drives tool
  const workCycle = Math.sin(t*3.5 + idx);      // -1..1, ~1.75Hz
  const workBob   = working ? Math.abs(workCycle)*-2 : walkBob;
  const bob = workBob || walkBob;
  const lg  = moving ? walkLg : 0;

  // Arm angles for working animation
  const armSwing = working ? workCycle * 0.6 : 0;  // rad

  const sk = style.female ? '#f4c8a0' : '#e8b880';
  const lfoot = style.female ? '#6a3850' : '#201808';

  // Shadow
  X.fillStyle='rgba(0,0,0,0.18)';
  X.beginPath();X.ellipse(px,py+5,9,3.5,0,0,Math.PI*2);X.fill();

  // ── LEGS ──
  if(style.female){
    FR(px-6+lg, py-5+bob, 5,8, style.pants); FR(px-1-lg, py-5+bob, 5,8, style.pants);
    FR(px-6+lg, py+2+bob, 5,3, lfoot);       FR(px-1-lg, py+2+bob, 5,3, lfoot);
  } else {
    FR(px-5+lg, py-5+bob, 5,8, style.pants); FR(px-1-lg, py-5+bob, 5,8, style.pants);
    FR(px-5+lg, py+2+bob, 5,3, style.shoe);  FR(px-1-lg, py+2+bob, 5,3, style.shoe);
  }

  // ── BODY ──
  FR(px-5, py-16+bob, 10,13, style.shirt);
  FR(px-2, py-16+bob, 4,3, lightenColor(style.shirt,30));
  // Pregnant belly
  if(isPreg){
    const pregProgress=npc.pregnant/PREG_DAYS;
    const bellyR=4+pregProgress*7;
    X.fillStyle='rgba(240,200,170,0.88)';
    X.beginPath();X.ellipse(px,py-9+bob,bellyR,bellyR*0.75,0,0,Math.PI*2);X.fill();
  }

  // ── ARMS (animated for work) ──
  // dominant arm (right) swings forward/back when working
  const armR_y = working ? py-16+bob + armSwing*8 : py-16+bob;
  const armL_y = working ? py-16+bob - armSwing*6 : py-14+bob;
  if(dir===1){
    FR(px+4, armR_y,   4,11, style.shirt); FR(px+4, armR_y+10,  4,4, sk);
    FR(px-8, armL_y,   4, 8, style.shirt); FR(px-8, armL_y+7,   4,4, sk);
  } else if(dir===3){
    FR(px-8, armR_y,   4,11, style.shirt); FR(px-8, armR_y+10,  4,4, sk);
    FR(px+4, armL_y,   4, 8, style.shirt); FR(px+4, armL_y+7,   4,4, sk);
  } else {
    // front/back — both arms visible
    const la = working ? armSwing*10 : 0;
    FR(px-9, py-16+bob+la, 4,10, style.shirt); FR(px-9, py-7+bob+la,  4,4, sk);
    FR(px+5, py-16+bob-la, 4,10, style.shirt); FR(px+5, py-7+bob-la,  4,4, sk);
  }

  // ── HEAD ──
  // slight head nod when working
  const headBob = working ? workCycle*1.5 : 0;
  FR(px-5, py-27+bob+headBob, 10,12, sk);

  // ── HAIR ──
  if(dir===2)      FR(px-5, py-27+bob+headBob, 10,4, style.hair);
  else if(dir===0) FR(px-5, py-27+bob+headBob, 10,5, style.hair);
  else { FR(px-5, py-27+bob+headBob, 10,3, style.hair); FR(dir===1?px+3:px-5, py-27+bob+headBob, 3,7, style.hair); }

  // ── EYES ──
  if(dir===2){ FR(px-3,py-22+bob+headBob,2,2,'#201010'); FR(px+1,py-22+bob+headBob,2,2,'#201010'); }

  // ── HAT ──
  const hy=py-28+bob+headBob;
  if(style.hat==='straw'){
    FR(px-5,hy-9,10,5,'#c49020'); FR(px-7,hy-5,14,4,'#d4a830'); FR(px-9,hy-4,18,2,'#d4a830');
  } else if(style.hat==='scarf'){
    FR(px-6,hy-6,12,7,npc.col); FR(px-7,hy-4,14,3,lightenColor(npc.col,30)); FR(px+5,hy-2,4,10,npc.col);
  } else if(style.hat==='cap'){
    FR(px-5,hy-5,10,5,'#3a3a3a'); FR(px-7,hy-1,14,2,'#282828');
  } else if(style.hat==='bun'){
    X.fillStyle=style.hair;X.beginPath();X.arc(px,hy-4,5,0,Math.PI*2);X.fill();
    FR(px-2,hy-3,4,3,'#3a2010');
  } else if(style.hat==='bandana'){
    FR(px-6,hy-5,12,6,npc.col); FR(px-7,hy-3,14,2,lightenColor(npc.col,20));
  } else if(style.hat==='veil'){
    FR(px-6,hy-6,12,8,'#e0d8f0'); FR(px-5,hy-5,10,6,lightenColor(npc.col,40)); FR(px-7,hy+1,14,2,'#e0d8f0');
  }

  // ── WORK ANIMATION — tool + effects ──
  if(working){
    const job=npc.job||'idle';
    const phase=workCycle; // -1..1

    if(job==='farmer'){
      // Hoe: up-down chopping into soil
      const hoeAngle = -Math.PI*0.3 + phase*0.5;
      X.save();X.translate(px+7, py-16+bob);X.rotate(hoeAngle);
      FR(-2,-28,3,28,'#8a5020');          // handle
      FR(-7,-28,12,4,'#909090');          // blade
      X.fillStyle='rgba(140,100,40,0.6)'; // dirt puff when hitting down
      if(phase>0.6) X.beginPath(),X.ellipse(0,0,8,4,0,0,Math.PI*2),X.fill();
      X.restore();
      // sweat drop
      if(phase>0.7){X.fillStyle='rgba(100,160,255,0.7)';X.beginPath();X.arc(px+12,py-28,2,0,Math.PI*2);X.fill();}

    } else if(job==='logger'){
      // Axe: big chopping swing
      const axeAngle = -Math.PI*0.6 + phase*0.8;
      X.save();X.translate(px+8, py-20+bob);X.rotate(axeAngle);
      FR(-2,-22,3,26,'#8a5020');
      X.fillStyle='#888'; X.beginPath();X.moveTo(-2,-22);X.lineTo(10,-26);X.lineTo(9,-14);X.closePath();X.fill();
      X.fillStyle='#aaa'; X.beginPath();X.moveTo(-2,-22);X.lineTo(4,-26);X.lineTo(4,-20);X.closePath();X.fill();
      X.restore();
      // wood chip particles on impact
      if(phase>0.7){
        X.fillStyle='#c8901a';
        X.beginPath();X.ellipse(px+14,py-4+bob,5,3,Math.random(),0,Math.PI*2);X.fill();
        X.beginPath();X.ellipse(px+10,py-8+bob,3,2,Math.random(),0,Math.PI*2);X.fill();
      }

    } else if(job==='fisher'){
      // Rod: cast line with bobber bouncing on water
      const rodAngle = -Math.PI*0.25 + phase*0.15;
      X.save();X.translate(px+6,py-22+bob);X.rotate(rodAngle);
      FR(-1,-16,3,20,'#b08040');
      X.restore();
      // fishing line
      const lineEnd={x:px+28+Math.sin(t*1.2)*3, y:py+2+Math.cos(t*1.5)*2};
      X.strokeStyle='rgba(220,220,220,0.65)';X.lineWidth=1;
      X.beginPath();X.moveTo(px+7,py-22+bob);X.quadraticCurveTo(px+22,py-10,lineEnd.x,lineEnd.y);X.stroke();
      // bobber
      X.fillStyle='#e02020';X.beginPath();X.arc(lineEnd.x,lineEnd.y,3,0,Math.PI*2);X.fill();
      X.fillStyle='#f0f0f0';X.beginPath();X.arc(lineEnd.x,lineEnd.y-1,1.5,Math.PI,0);X.fill();
      // ripple rings on water
      const rScale=(t*2)%1;
      X.strokeStyle=`rgba(100,180,255,${0.5-rScale*0.5})`;X.lineWidth=1;
      X.beginPath();X.ellipse(lineEnd.x,lineEnd.y+1,8*rScale,3*rScale,0,0,Math.PI*2);X.stroke();

    } else if(job==='miner'){
      // Pickaxe: heavy overhead swing
      const pickAngle = -Math.PI*0.7 + phase*0.9;
      X.save();X.translate(px+7,py-18+bob);X.rotate(pickAngle);
      FR(-2,-24,3,28,'#8a5020');
      X.fillStyle='#909090';X.beginPath();X.moveTo(-2,-24);X.lineTo(12,-28);X.lineTo(10,-18);X.closePath();X.fill();
      X.fillStyle='#b0b0b0';X.beginPath();X.moveTo(-2,-20);X.lineTo(6,-24);X.lineTo(6,-18);X.closePath();X.fill();
      X.restore();
      // spark + dust on impact
      if(phase>0.65){
        X.fillStyle='rgba(255,200,50,0.8)';
        for(let i=0;i<3;i++) {X.beginPath();X.arc(px+14+i*3,py-3+bob-i*2,1.5,0,Math.PI*2);X.fill();}
        X.fillStyle='rgba(160,150,140,0.5)';
        X.beginPath();X.ellipse(px+12,py-2+bob,7,4,0,0,Math.PI*2);X.fill();
      }

    } else if(job==='smelter'){
      // Stirring molten metal with a rod
      const stirAngle = t*2.5;
      X.save();X.translate(px+4,py-10+bob);
      FR(-1,-20,2,20,'#808080'); // rod
      X.fillStyle=`rgba(255,${130+Math.sin(t*4)*30|0},0,0.8)`;
      X.beginPath();X.ellipse(Math.cos(stirAngle)*5,Math.sin(stirAngle)*3,4,3,0,0,Math.PI*2);X.fill();
      X.restore();
      // heat shimmer dots
      for(let i=0;i<2;i++){
        X.fillStyle=`rgba(255,180,0,${0.4+Math.sin(t*5+i)*0.2})`;
        X.beginPath();X.arc(px-4+i*8,py-32+bob+Math.sin(t*3+i)*3,2,0,Math.PI*2);X.fill();
      }

    } else if(job==='builder'){
      // Hammering: up-down with hammer
      const hamAngle = -Math.PI*0.3 + phase*0.6;
      X.save();X.translate(px+7,py-18+bob);X.rotate(hamAngle);
      FR(-2,-20,3,22,'#8a5020');
      FR(-5,-20,10,6,'#606060');  // hammer head
      FR(-5,-24,10,5,'#808080');  // top of head
      X.restore();
      if(phase>0.6){X.fillStyle='rgba(255,220,50,0.7)';X.beginPath();X.arc(px+14,py-5+bob,3,0,Math.PI*2);X.fill();}

    } else if(job==='trader'){
      // Counting coins / writing ledger
      const tilt = Math.sin(t*1.5)*0.2;
      X.save();X.translate(px+6,py-16+bob);X.rotate(tilt);
      FR(-8,-14,16,12,'#f0d880'); // ledger book
      FR(-7,-13,14,10,'#fff8e0');
      // pencil scribble lines
      X.strokeStyle='rgba(0,0,0,0.3)';X.lineWidth=1;
      for(let i=0;i<3;i++) LN(-6,-11+i*3,5,-11+i*3,'rgba(0,0,0,0.3)');
      X.restore();
      // coin sparkle
      if(Math.sin(t*4)>0.6){X.fillStyle='#f0c020';X.beginPath();X.arc(px+14,py-22+bob,4,0,Math.PI*2);X.fill();X.fillStyle='#fff';X.beginPath();X.arc(px+13,py-23+bob,1.5,0,Math.PI*2);X.fill();}

    } else if(job==='hunter'){
      // Drawing bow: arm pulls back
      const pull = (phase+1)/2; // 0..1
      X.strokeStyle='#7a4010';X.lineWidth=2;
      // bow curve
      X.beginPath();X.arc(px+6,py-18+bob,12,Math.PI*0.6,Math.PI*1.4);X.stroke();
      // string (pulled back)
      const pullX = px-2-pull*4;
      X.strokeStyle='rgba(220,200,160,0.8)';X.lineWidth=1;
      X.beginPath();X.moveTo(px+6,py-28+bob);X.lineTo(pullX,py-18+bob);X.lineTo(px+6,py-8+bob);X.stroke();
      // arrow
      X.strokeStyle='#8a6020';X.lineWidth=1.5;
      X.beginPath();X.moveTo(pullX-2,py-18+bob);X.lineTo(px+6,py-18+bob);X.stroke();
      // arrowhead
      X.fillStyle='#707070';X.beginPath();X.moveTo(px+6,py-18+bob);X.lineTo(px+4,py-20+bob);X.lineTo(px+4,py-16+bob);X.closePath();X.fill();

    } else if(job==='fisher'&&!working){
      // idle fishing rod resting on shoulder
      FR(px+6,py-26+bob,2,22,'#a07040');
    }

    // ── WORK STATUS BUBBLE ──
    // Small emoji showing current action
    const workEmojis={farmer:'⚒',logger:'🪓',fisher:'🎣',miner:'⛏',smelter:'🔥',builder:'🔨',trader:'📖',hunter:'🏹'};
    const we=workEmojis[job];
    if(we){
      X.font='10px serif';X.textAlign='center';
      // bounce bubble
      const bubbleY=py-44+bob+Math.sin(t*2+idx)*2;
      X.fillStyle='rgba(255,255,220,0.88)';
      X.beginPath();X.roundRect(px-8,bubbleY-10,16,13,3);X.fill();
      X.fillText(we,px,bubbleY);
    }

  } else if(!moving){
    // ── IDLE animation — gentle breathing/sway ──
    const sway = Math.sin(t*1.2+idx)*1.5;
    // slight arm sway
    FR(px-9+sway, py-16+bob, 4,10, style.shirt); FR(px+5-sway, py-16+bob, 4,10, style.shirt);
    FR(px-9+sway, py-7+bob,  4,4, sk);           FR(px+5-sway, py-7+bob,  4,4, sk);
  }

  // Restore scale for children
  if(isChild) X.restore();

  // ── JOB BADGE + NAME ──
  const jobInfo=typeof JOBS!=='undefined'&&JOBS[npc.job||'idle'];
  const badge=isChild?'👶':(isPreg?'🤰':(jobInfo?jobInfo.e:'😴'));
  // Carry indicator for storage workers
  let carryIcon='';
  if(!isChild&&!isPreg){
    for(const[bid,workers]of Object.entries(G.bldWorkers)){
      if(workers.includes(npc.name)){
        const b=G.bld.find(b2=>b2.id===+bid);
        if(b?.type==='granary') carryIcon='🍞';
        else if(b?.type==='storehouse') carryIcon='📦';
        else if(b?.type==='food_stall'||b?.type==='fuel_stall'||b?.type==='clothing_stall') carryIcon='🛒';
        break;
      }
    }
    if(isHomeBusiness(npc.houseId)) carryIcon='🏠';
  }
  X.font='11px serif';X.textAlign='center';X.fillText(badge,px,py-34+bob);
  X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(px-18,py-26,36,9);
  X.fillStyle='#f0e0a0';X.font='5px "Press Start 2P"';X.textAlign='center';X.fillText(npc.name,px,py-19);
  if(carryIcon&&npc._working){
    X.font='12px serif';X.fillText(carryIcon,px+14,py-18);
  }

  // ── CHAT BUBBLE when player nearby ──
  const dx=PL.x-npc.x, dy=PL.y-npc.y;
  if(Math.sqrt(dx*dx+dy*dy)<TS*1.8){
    X.fillStyle='#fffde0';X.beginPath();X.roundRect(px-10,py-46,20,12,3);X.fill();
    X.font='10px serif';X.textAlign='center';X.fillText('💬',px,py-37);
  }
}

function lightenColor(hex,amt){
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return `rgb(${r},${g},${b})`;
}

function doInteract(){
  if(document.getElementById('dialog').classList.contains('show')){closeDialog();return;}
  if(G.mode==='build'){G.mode='walk';buildType=null;notify('Build cancelled','warn');updateModeUI();return;}
  // Try hunt first
  if(tryHunt())return;
  const pr=TS*1.7;
  for(const npc of NPCS){
    if(Math.sqrt((PL.x-npc.x)**2+(PL.y-npc.y)**2)<pr){showNPCDlg(npc);return;}
  }
  const pc=Math.floor(PL.x/TS),pr2=Math.floor(PL.y/TS);
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    const r=pr2+dr,c=pc+dc;
    if(r<0||r>=WR||c<0||c>=WC)continue;
    if(MAP[r][c].bld){showBldDlg(MAP[r][c].bld,c,r);return;}
  }
  notify('Nothing nearby to interact with','warn');
}

// Job definitions
// prod = base per worker per day
// req  = building type required (null = no req)
// bonus = building that multiplies output
const JOBS={
  idle:   {n:'Idle',     e:'😴',prod:{},         req:null,       mult:null},
  farmer: {n:'Petani',   e:'🌾',prod:{food:3},   req:'farm',     mult:'mill'},
  logger: {n:'Penebang', e:'🪓',prod:{wood:4},   req:'logger',   mult:'sawmill'},
  miner:  {n:'Penambang',e:'⛏',prod:{stone:3},  req:'quarry',   mult:null},
  smelter:{n:'Smelter',  e:'🔥',prod:{metal:1},  req:'smelter',  mult:null},
  trader: {n:'Pedagang', e:'💰',prod:{gold:2},   req:'market',   mult:null},
  builder:{n:'Builder',  e:'🔨',prod:{wood:1,stone:1},req:'blacksmith',mult:null},
  fisher: {n:'Nelayan',  e:'🎣',prod:{food:2},   req:null,       mult:null},
  hunter: {n:'Pemburu',  e:'🏹',prod:{meat:2,food:1},req:'hunting', mult:null},
};

// Get actual output for a worker given current buildings
function jobOutput(jobId){
  const j=JOBS[jobId||'idle'];
  if(!j||!Object.keys(j.prod).length)return{prod:{},active:false,missing:null};
  // check required building
  if(j.req){
    const has=G.bld.some(b=>b.type===j.req);
    if(!has)return{prod:{},active:false,missing:BD[j.req]?.n||j.req};
  }
  // compute output with multiplier
  const mul=G.season===3?.65:G.season===1?1.15:1;
  const hasMult=j.mult&&G.bld.some(b=>b.type===j.mult);
  const prod={};
  for(const[r,v]of Object.entries(j.prod))prod[r]=Math.round(v*mul*(hasMult?1.5:1));
  return{prod,active:true,missing:null};
}

// ─── MOVEMENT ───
function movePlayer(){
  let dx=0,dy=0;
  if(keys.has('arrowleft')||keys.has('a'))dx=-1;
  if(keys.has('arrowright')||keys.has('d'))dx=1;
  if(keys.has('arrowup')||keys.has('w'))dy=-1;
  if(keys.has('arrowdown')||keys.has('s'))dy=1;
  if(dx&&dy){dx*=.707;dy*=.707;}
  const sp=PL.spd,m=2;
  const nx=PL.x+dx*sp,ny=PL.y+dy*sp;
  if(!solid(nx-m,PL.y-m)&&!solid(nx+m,PL.y-m)&&!solid(nx-m,PL.y+m)&&!solid(nx+m,PL.y+m))PL.x=nx;
  if(!solid(PL.x-m,ny-m)&&!solid(PL.x+m,ny-m)&&!solid(PL.x-m,ny+m)&&!solid(PL.x+m,ny+m))PL.y=ny;
  if(dx<0)PL.dir=3;else if(dx>0)PL.dir=1;if(dy<0)PL.dir=0;else if(dy>0)PL.dir=2;
  PL.vx=dx;PL.vy=dy;
  if(dx||dy){PL.ft++;if(PL.ft>8){PL.ft=0;PL.fr++;}}else{PL.fr=0;PL.ft=0;}
}

function solid(wx,wy){
  const c=Math.floor(wx/TS),r=Math.floor(wy/TS);
  if(c<0||c>=WC||r<0||r>=WR)return true;
  const tile=MAP[r][c];
  if(tile.t===T.WATER||!!tile.bld) return true;
  if(tile.decor==='tree'||tile.decor==='rock'||tile.decor==='bush'){
    const tx=c*TS+TS/2, ty2=r*TS+TS/2;
    return Math.abs(wx-tx)<20&&Math.abs(wy-ty2)<20;
  }
  return false;
}

function updateCam(){
  const vw=CV.width,vh=CV.height-HH-BH;
  let tx=Math.round(-(PL.x-vw/2)),ty=Math.round(-(PL.y-vh/2));
  tx=Math.min(0,Math.max(tx,-(WPX-vw)));
  ty=Math.min(0,Math.max(ty,-(WPY-vh)));
  const d=Math.abs(tx-camX)+Math.abs(ty-camY);
  const lp=d>300?1:0.14;
  camX=Math.round(camX+(tx-camX)*lp);
  camY=Math.round(camY+(ty-camY)*lp);
}
function centerCam(){
  const vw=CV.width,vh=CV.height-HH-BH;
  camX=Math.round(-(PL.x-vw/2));camY=Math.round(-(PL.y-vh/2));
  camX=Math.min(0,Math.max(camX,-(WPX-vw)));camY=Math.min(0,Math.max(camY,-(WPY-vh)));
}

// ─── TICK ───
function tick(){
  G.mn+=G.spd*2;
  if(G.mn>=60){G.mn=0;G.hr++;}
  if(G.hr>=24){G.hr=0;G.day++;G.ticks++;if(G.ticks%2===0)doProd();
    if(G.day>90){G.day=1;G.season=(G.season+1)%4;}if(G.day>360){G.day=1;G.yr++;}
  }
  const _tl=document.getElementById('timelbl');if(_tl)_tl.textContent='Day '+G.day;
  const _tl2=document.getElementById('timelbl2');if(_tl2)_tl2.textContent=String(G.hr).padStart(2,'0')+':'+String(G.mn).padStart(2,'0');
}

// ─── PRODUCTION ───
function doProd(){
  const mul=G.season===3?0.7:G.season===1?1.2:1;
  const wm=G.bld.some(b=>b.type==='mill')?1.5:1;
  const saw=G.bld.some(b=>b.type==='sawmill')?1.5:1;

  // House needs consumption
  let foodNeed=0,coalNeed=0,clothNeed=0,beerNeed=0;
  for(const b of G.bld){
    if(b.type!=='house')continue;
    const needs=BD.house.needs[b.lv]||BD.house.needs[1];
    const residents=NPCS.filter(n=>n.houseId===b.id).length||2;
    foodNeed+=Math.ceil((needs.food||0)*residents);
    coalNeed+=Math.ceil((needs.coal||0)*residents);
    clothNeed+=Math.ceil((needs.cloth||0)*residents);
    beerNeed+=Math.ceil((needs.beer||0)*residents);
  }
  if(G.res.food>=foodNeed)G.res.food-=foodNeed;
  else{G.happy=Math.max(10,G.happy-5);notify('😟 Warga kelaparan!','warn');}
  if(coalNeed>0){if((G.res.coal||0)>=coalNeed)G.res.coal-=coalNeed;else G.happy=Math.max(10,G.happy-3);}
  if(clothNeed>0){if((G.res.cloth||0)>=clothNeed)G.res.cloth-=clothNeed;else{G.happy=Math.max(10,G.happy-3);notify('👘 Butuh pakaian!','warn');}}
  if(beerNeed>0&&(G.res.beer||0)>=beerNeed){G.res.beer-=beerNeed;G.happy=Math.min(100,G.happy+1);}

  // Tax
  let taxTotal=0;
  for(const b of G.bld){
    if(b.type!=='house')continue;
    const workers=(G.bldWorkers[b.id]||[]).filter(n=>n).length;
    taxTotal+=(BD.house.tax[b.lv]||1)*(workers>0?1:0.5);
  }
  if(taxTotal>0){const tg=Math.round(taxTotal);G.res.gold=(G.res.gold||0)+tg;G.res.wealth=(G.res.wealth||0)+tg;}

  // Age NPCs
  for(const npc of NPCS)npc.age+=2;

  // Pregnancy
  const babies=[];
  for(const npc of NPCS){
    if(!npc.female||!npc.pregnant)continue;
    npc.pregnant+=2;
    if(npc.pregnant>=PREG_DAYS){
      npc.pregnant=0;
      const housemates=NPCS.filter(n=>n.houseId===npc.houseId);
      if(housemates.length<4)babies.push({npc,houseId:npc.houseId,familyId:npc.familyId});
      else notify(npc.name+' melahirkan tapi rumah penuh!','warn');
    }
  }
  for(const b of babies){
    const babyNames=['Aldi','Rini','Danu','Ayu','Fajar','Bunga','Rizki','Sela'];
    const isFemale=Math.random()<0.5;
    const bname=babyNames[Math.floor(Math.random()*babyNames.length)];
    const npcMom=b.npc;
    const baby={name:bname,x:npcMom.x+(-10+Math.random()*20),y:npcMom.y+(-10+Math.random()*20),
      dir:2,col:isFemale?'#f0a0c0':'#a0d0f0',job:null,female:isFemale,age:0,
      familyId:b.familyId,pregnant:0,houseId:b.houseId};
    NPCS.push(baby);
    notify('👶 '+npcMom.name+' melahirkan '+bname+'!','ok');
  }
  // Pregnancy chance
  if(G.res.food>10){
    for(const npc of NPCS){
      if(!npc.female||npc.pregnant||!isAdult(npc))continue;
      const housemates=NPCS.filter(n=>n.houseId===npc.houseId);
      const hasHusband=housemates.some(n=>!n.female&&isAdult(n));
      const kidsInHouse=housemates.filter(n=>!isAdult(n)).length;
      if(hasHusband&&kidsInHouse<2&&housemates.length<4&&Math.random()<0.008){npc.pregnant=1;notify('🤰 '+npc.name+' hamil!','ok');}
    }
  }
  // Adulthood
  for(const npc of NPCS){if(npc.age>=ADULT_DAYS&&npc.age-2<ADULT_DAYS)notify('🎉 '+npc.name+' sudah dewasa!','ok');}

  // Chain production (bakery, malthouse, ironworks)
  for(const b of G.bld){
    const d=BD[b.type];if(!d.chain)continue;
    const maxW=BLD_WORKERS[b.type]||d.chain.workers||2;
    const workerNames=(G.bldWorkers[b.id]||[]).filter(n=>n);
    const workers=workerNames.length;
    if(!workers)continue;
    const eff=workers/maxW;
    let canProduce=true;
    for(const[res,qty]of Object.entries(d.chain.input||{})){if((G.res[res]||0)<qty*eff){canProduce=false;break;}}
    if(!canProduce){b._chainBlocked=true;continue;}
    b._chainBlocked=false;
    for(const[res,qty]of Object.entries(d.chain.input||{}))G.res[res]=Math.max(0,(G.res[res]||0)-Math.ceil(qty*eff));
    for(const[res,qty]of Object.entries(d.chain.output||{}))addR(res,Math.round(qty*eff*b.lv*mul));
  }

  // Simple production
  for(const b of G.bld){
    const d=BD[b.type];if(!d.pr)continue;
    const maxW=BLD_WORKERS[b.type]||0;
    const workerNames=maxW>0?(G.bldWorkers[b.id]||[]).filter(n=>n):[];
    const workers=workerNames.length||(maxW>0?0:1);
    if(maxW>0&&workers===0)continue;
    let effMul=1;
    if(maxW>0){
      let totalEff=0;
      for(const nm of workerNames){
        const npc2=NPCS.find(n=>n.name===nm);
        if(npc2&&isHomeBusiness(npc2.houseId)&&b.type!=='house')continue;
        totalEff+=workerEff(nm,b.id);
      }
      effMul=workerNames.length>0?totalEff/Math.max(1,workerNames.length):0;
      if(effMul===0)continue;
    }
    const wMul=maxW>0?workers*effMul:1;
    if(b.type==='market'){
      const hasFoodWorker=hasStorageWorker('food'),hasMatWorker=hasStorageWorker('wood');
      if(!hasFoodWorker&&!hasMatWorker){if(!b._noStockWarn){b._noStockWarn=true;notify('🏪 Pasar kehabisan stok!','warn');}continue;}
      b._noStockWarn=false;
    }
    for(const[res,amt]of Object.entries(d.pr)){
      let fa=amt*b.lv*mul*wMul;
      if(res==='food')fa*=wm;if(res==='wood')fa*=saw;
      addR(res,Math.round(fa));
    }
  }

  doFarmProd();doByardProd();collectPending();updateMarket();checkPopGrowth();
  upPop();updateUI();
}

// ─── JOB OUTPUT ───
function jobOutput(job){
  const j=JOBS[job];if(!j)return{prod:{},active:false};
  if(job==='idle')return{prod:{},active:false};
  if(j.req&&!G.bld.some(b=>b.type===j.req))return{prod:{},active:false,missing:j.req};
  const prod={};
  if(j.prod){for(const[k,v]of Object.entries(j.prod))prod[k]=v;}
  return{prod,active:true};
}

function tryPlaceRoad(c,r){
  const tile=MAP[r][c];
  if(tile.t===T.PATH){tile.t=T.GRASS;rebuildTile(c,r);}
  if(tile.t===T.FIELD){removeField(c,r);rebuildTile(c,r);}
  else if(tile.t!==T.WATER&&!tile.bld&&tile.decor!=='tree'&&tile.decor!=='bush'){
    tile.t=T.PATH;rebuildTile(c,r);
  }
}

}

function tryPlaceBuilding(c,r){
  if(!buildType)return;

  const tile=MAP[r][c];
  if(tile.t===T.WATER||tile.bld||tile.decor){notify('Cannot build here!','err');return;}

  notify('✅ '+d2.n+' built!','ok');
  G.mode='walk';buildType=null;updateModeUI();updateUI();
}

// ─── WATER SPOTS FOR FISHER ───
let _waterSpots=null;
function getWaterSpots(){
  if(_waterSpots)return _waterSpots;
  _waterSpots=[];
  for(let r=0;r<WR;r++)for(let c=0;c<WC;c++){
    if(MAP[r][c].t===T.WATER){
      for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
        const nr=r+dr,nc=c+dc;
        if(nr>=0&&nr<WR&&nc>=0&&nc<WC&&MAP[nr][nc].t!==T.WATER&&!MAP[nr][nc].bld)
          _waterSpots.push({x:nc*TS+TS/2,y:nr*TS+TS/2});
      }
    }
  }
  return _waterSpots;
}

// ─── FIND JOB LOCATION ───
function findJobLocation(job,npcIdx){
  if(job==='fisher'){
    const spots=getWaterSpots();
    if(!spots.length)return null;
    return spots[npcIdx%spots.length];
  }
  if(job==='hunter'){
    for(const[bldId,workers]of Object.entries(G.bldWorkers)){
      if(workers.includes(NPCS[npcIdx]?.name)){
        const bld=G.bld.find(b=>b.id===+bldId&&b.type==='hunting');
        if(bld)return{x:bld.col*TS+TS/2,y:(bld.row+1)*TS+TS/2};
      }
    }
    return null;
  }
  const req=JOBS[job]?.req;if(!req)return null;
  // Find assigned building for this NPC
  for(const[bldId,workers]of Object.entries(G.bldWorkers)){
    if(workers.includes(NPCS[npcIdx]?.name)){
      const bld=G.bld.find(b=>b.id===+bldId);
      if(bld)return{x:bld.col*TS+TS/2,y:bld.row*TS+TS/2};
    }
  }
  const bld=G.bld.find(b=>b.type===req);
  if(!bld)return null;
  return{x:bld.col*TS+TS/2,y:bld.row*TS+TS/2};
}

function workSpot(targetX,targetY,npcIdx){
  const offsets=[{x:-TS*.8,y:0},{x:TS*.8,y:0},{x:0,y:-TS*.8},{x:0,y:TS*.8},{x:-TS*.5,y:-TS*.5},{x:TS*.5,y:-TS*.5}];
  const off=offsets[npcIdx%offsets.length];
  return{x:targetX+off.x,y:targetY+off.y};
}

// ─── NPC WANDER ───
function wanderNPCs(){
  for(let i=0;i<NPCS.length;i++){
    const npc=NPCS[i];
    if(!isAdult(npc)){
      npc._working=false;npc._wt=(npc._wt||0)+1;
      if(npc._wt>60){npc._wt=0;if(Math.random()<.3){npc._dx=0;npc._dy=0;}else{const d=[[-0.7,0],[0.7,0],[0,-0.7],[0,0.7]][Math.random()*4|0];npc._dx=d[0];npc._dy=d[1];}}
    } else {
      const job=npc.job||'idle';
      const jobLoc=findJobLocation(job,i);
      if(jobLoc){
        const spot=workSpot(jobLoc.x,jobLoc.y,i);
        const dx=spot.x-npc.x,dy=spot.y-npc.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>32){
          const spd=0.9;npc._dx=(dx/dist)*spd;npc._dy=(dy/dist)*spd;npc._working=false;
        } else {
          npc._working=true;
          if(job==='hunter'){
            const aliveDeer=DEER.filter(d=>d.alive);
            if(aliveDeer.length>0){
              let nearestDeer=null,nearestDist=Infinity;
              for(const d of aliveDeer){const dd=Math.hypot(npc.x-d.x,npc.y-d.y);if(dd<nearestDist){nearestDist=dd;nearestDeer=d;}}
              if(nearestDeer){
                const ddx=nearestDeer.x-npc.x,ddy=nearestDeer.y-npc.y;
                const ddist=Math.hypot(ddx,ddy);
                if(ddist>TS*1.4){npc._dx=(ddx/ddist)*1.0;npc._dy=(ddy/ddist)*1.0;npc._working=false;}
                else{
                  npc._dx=0;npc._dy=0;npc._working=true;
                  npc._huntTimer=(npc._huntTimer||0)+1;
                  if(npc._huntTimer>240){
                    npc._huntTimer=0;nearestDeer.alive=false;
                    nearestDeer.respawnT=Date.now()+60000*(2+Math.random()*2);
                    const meat=2+Math.floor(Math.random()*3);
                    addR('meat',meat);addR('food',meat);
                    notify('🏹 '+npc.name+' berburu! +'+meat+' daging','ok');updateUI();
                  }
                }
              }
            } else {npc._dx=0;npc._dy=0;}
          } else {
            npc._wt=(npc._wt||0)+1;
            if(npc._wt>120){npc._wt=0;if(Math.random()<0.4){const tiny=[[-0.3,0],[0.3,0],[0,-0.3],[0,0.3]][Math.random()*4|0];npc._dx=tiny[0];npc._dy=tiny[1];}}
          }
        }
      } else if(job==='hunter'){
        npc._working=false;npc._wt=(npc._wt||0)+1;
        if(npc._wt>80){npc._wt=0;const d=[[-0.7,0],[0.7,0],[0,-0.7],[0,0.7]][Math.random()*4|0];npc._dx=d[0];npc._dy=d[1];}
      } else {
        npc._working=false;npc._wt=(npc._wt||0)+1;
        if(npc._wt>60){npc._wt=0;if(Math.random()<.5){npc._dx=0;npc._dy=0;}else{const d=[[-0.6,0],[0.6,0],[0,-0.6],[0,0.6]][Math.random()*4|0];npc._dx=d[0];npc._dy=d[1];}}
      }
    }
    // Move
    const moving=!!(npc._dx||npc._dy);
    if(moving){
      const nx=npc.x+npc._dx,ny=npc.y+npc._dy;
      const c=Math.floor(nx/TS),r=Math.floor(ny/TS);
      const canEnterForest=(npc.job==='hunter');
      const tile_=c>=0&&c<WC&&r>=0&&r<WR?MAP[r][c]:null;
      const tileOk=tile_&&tile_.t!==T.WATER&&!tile_.bld&&(canEnterForest||(tile_.t!==T.FOREST&&!(tile_.decor==='tree'||tile_.decor==='rock')));
      if(tileOk){npc.x=nx;npc.y=ny;}
      else{
        const cx2=Math.floor((npc.x+npc._dx)/TS),cy2=Math.floor(npc.y/TS);
        const t2=cx2>=0&&cx2<WC&&cy2>=0&&cy2<WR?MAP[cy2][cx2]:null;
        const t2ok=t2&&t2.t!==T.WATER&&!t2.bld&&(canEnterForest||(t2.t!==T.FOREST&&!(t2.decor==='tree')));
        if(t2ok)npc.x+=npc._dx;
        const cx3=Math.floor(npc.x/TS),cy3=Math.floor((npc.y+npc._dy)/TS);
        const t3=cx3>=0&&cx3<WC&&cy3>=0&&cy3<WR?MAP[cy3][cx3]:null;
        const t3ok=t3&&t3.t!==T.WATER&&!t3.bld&&(canEnterForest||(t3.t!==T.FOREST&&!(t3.decor==='tree')));
        if(t3ok)npc.y+=npc._dy;
        if(!t2ok&&!t3ok){npc._dx=0;npc._dy=0;}
      }
      if(npc._dx<-0.1)npc.dir=3;else if(npc._dx>0.1)npc.dir=1;
      if(npc._dy<-0.1)npc.dir=0;else if(npc._dy>0.1)npc.dir=2;
      npc._ft=(npc._ft||0)+1;if(npc._ft>8){npc._ft=0;npc._fr=(npc._fr||0)+1;}
    } else {npc._fr=0;npc._ft=0;}
  }
}

let camX=0,camY=0;
let _showFertility=false;
function toggleFertilityMap(){
  _showFertility=!_showFertility;
  notify(_showFertility?'🗺 Peta kesuburan ON':'Peta kesuburan OFF','ok');
