<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gozo Village</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'VT323',monospace;}
#c{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#hud{position:fixed;top:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,rgba(0,0,0,.92),rgba(0,0,0,.6));border-bottom:2px solid #5a3a1a;padding:4px 10px;display:flex;align-items:center;gap:6px;height:42px;}
#logo{font-family:'Press Start 2P';font-size:9px;color:#f0c040;text-shadow:2px 2px #8b4000;white-space:nowrap;flex-shrink:0;}
.hdv{width:2px;height:28px;background:#5a3a1a;flex-shrink:0;}
#resbar{display:flex;gap:3px;flex:1;flex-wrap:wrap;}
.res{display:flex;align-items:center;gap:2px;background:rgba(15,8,2,.85);border:2px solid #3a2a10;padding:2px 6px;font-size:15px;color:#e8d090;}
.res b{color:#f0c040;min-width:24px;text-align:right;}
#vpills{display:flex;gap:4px;flex-shrink:0;}
.vp{background:rgba(15,8,2,.85);border:2px solid #3a2a10;padding:2px 7px;font-size:13px;color:#f0c040;}
#mm{position:fixed;top:48px;right:8px;z-index:95;border:2px solid #5a3a1a;background:#0a0604;}
#mmc{display:block;image-rendering:pixelated;}
#dialog{position:fixed;bottom:46px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(4,2,1,.97);border:3px solid #5a3a1a;padding:12px 18px;width:500px;max-width:94vw;display:none;}
#dialog.show{display:block;}
#dname{font-family:'Press Start 2P';font-size:8px;color:#f0c040;margin-bottom:6px;}
#dmsg{font-size:15px;color:#c8a870;line-height:1.5;margin-bottom:10px;}
#dbtns{display:flex;gap:6px;flex-wrap:wrap;}
.dbtn{padding:5px 10px;background:#100a04;border:2px solid #3a2a10;color:#a08050;font-family:'Press Start 2P';font-size:6px;cursor:pointer;}
.dbtn:hover{border-color:#f0c040;color:#f0c040;}
.dbtn.ok{border-color:#208020;color:#40c040;}.dbtn.bad{border-color:#802020;color:#c04040;}
#notifs{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;}
.ntf{background:rgba(4,2,1,.96);border:2px solid #5a3a1a;padding:5px 12px;font-size:14px;color:#e8d090;animation:nfin .25s,nfout .4s 2.2s forwards;}
.ntf.ok{border-color:#208020;color:#40c040;}.ntf.err{border-color:#802020;color:#c04040;}.ntf.warn{border-color:#806020;color:#e0a020;}
@keyframes nfin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes nfout{to{opacity:0}}
#dpad{position:fixed;bottom:46px;left:12px;z-index:150;width:132px;height:132px;display:none;}
.dp{width:44px;height:44px;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.2);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;border-radius:4px;position:absolute;-webkit-tap-highlight-color:transparent;}
#dpU{top:0;left:44px;}#dpD{top:88px;left:44px;}#dpL{top:44px;left:0;}#dpR{top:44px;left:88px;}#dpE{top:44px;left:44px;font-size:11px;font-family:'Press Start 2P';}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="logo">⚔ GOZO</div>
  <div class="hdv"></div>
  <div id="resbar">
    <div class="res">🪵<b id="rw">50</b></div>
    <div class="res">🪨<b id="rs">30</b></div>
    <div class="res">⚫<b id="rc">0</b></div>
    <div class="res">⚙<b id="rm">0</b></div>
    <div class="res">🌾<b id="rf">20</b></div>
    <div class="res">💰<b id="rg">100</b></div>
  </div>
  <div class="hdv"></div>
  <div id="vpills">
    <div class="vp">👥 <span id="pop">0</span>/<span id="cap">0</span></div>
    <div class="vp" id="season">🌱 Spring Y1</div>
    <div class="vp" id="timelbl">Day 1 06:00</div>
  </div>
</div>
<div id="mm"><canvas id="mmc" width="140" height="110"></canvas></div>
<div id="dialog">
  <div id="dname"></div>
  <div id="dmsg"></div>
  <div id="dbtns"></div>
</div>
<div id="notifs"></div>
<div id="dpad">
  <div class="dp" id="dpU">▲</div>
  <div class="dp" id="dpD">▼</div>
  <div class="dp" id="dpL">◄</div>
  <div class="dp" id="dpR">►</div>
  <div class="dp" id="dpE">E</div>
</div>
<script>
'use strict';
const CV=document.getElementById('c');
const X=CV.getContext('2d');
X.imageSmoothingEnabled=false;

const TW=48, TH_T=48;
const COLS=40, ROWS=30;
const WW=COLS*TW, WH=ROWS*TH_T;
const HUD_H=42, BOT_H=38;
let camX=0, camY=0;

// Player
const PL={x:WW/2,y:WH/2,vx:0,vy:0,spd:2.6,dir:2,frame:0,ft:0};

// Game state
const G={res:{wood:80,stone:50,coal:0,iron:0,metal:0,food:40,gold:100},
  pop:2,cap:4,happy:80,health:70,day:1,hr:6,mn:0,yr:1,season:0,
  seasons:['🌱 Spring','☀️ Summer','🍂 Autumn','❄️ Winter'],
  paused:false,spd:1,bld:[],nid:1,ticks:0};

const BD={
  house:    {n:'House',     e:'🏠',d:'+2 pop cap.',      cost:{wood:15,stone:5},  ml:3,pop:2},
  farm:     {n:'Farm',      e:'🌾',d:'+3 food/tick.',    cost:{wood:10},          ml:3,pr:{food:3}},
  logger:   {n:'Logger',   e:'🪓',d:'+4 wood/tick.',    cost:{wood:12,stone:5},  ml:3,pr:{wood:4}},
  quarry:   {n:'Quarry',   e:'🪨',d:'+3 stone/tick.',   cost:{wood:15},          ml:3,pr:{stone:3}},
  market:   {n:'Market',   e:'🏪',d:'+2 gold/tick.',    cost:{wood:30,gold:20},  ml:3,pr:{gold:2}},
  well:     {n:'Well',     e:'💧',d:'+10 health.',      cost:{wood:8,stone:10},  ml:2},
  church:   {n:'Church',   e:'⛪',d:'+20 happiness.',   cost:{wood:40,stone:30}, ml:2},
  blacksmith:{n:'Blacksmith',e:'🔨',d:'Craft upgrades.',cost:{wood:20,stone:15}, ml:2},
  mill:     {n:'Windmill', e:'⚙', d:'Farm +50%.',       cost:{wood:25,stone:15}, ml:2},
  smelter:  {n:'Smelter',  e:'🔥',d:'Makes metal.',     cost:{wood:30,stone:25,coal:5},ml:2,pr:{metal:1}},
  coalmine: {n:'Coal Mine',e:'⛏',d:'+2 coal/tick.',    cost:{wood:20,stone:10}, ml:3,pr:{coal:2}},
  ironmine: {n:'Iron Mine',e:'⚙',d:'+2 iron/tick.',    cost:{wood:25,stone:20}, ml:3,pr:{iron:2}},
};

// World map
let MAP=[], NPCS=[];

function rng(s){let v=s;return()=>{v=Math.sin(v*9301+49297)*233280;return v-(v|0);};}
const R42=rng(42);

function genMap(){
  MAP=[];
  for(let r=0;r<ROWS;r++){MAP[r]=[];for(let c=0;c<COLS;c++)MAP[r][c]={t:0,bld:null};}
  const mc=COLS/2|0, mr=ROWS/2|0;
  // horizontal road
  for(let c=1;c<COLS-1;c++){MAP[mr][c].t=1;MAP[mr+1][c].t=1;}
  // vertical road
  for(let r=1;r<ROWS-1;r++){MAP[r][mc].t=1;MAP[r][mc+1].t=1;}
  // village square
  for(let r=mr-2;r<=mr+3;r++)for(let c=mc-2;c<=mc+3;c++)MAP[r][c].t=1;
  // river left side
  for(let r=2;r<ROWS-2;r++){MAP[r][3].t=2;MAP[r][4].t=2;if(r%4===0)MAP[r][2].t=2;}
  // trees & rocks scattered
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(r<2||r>=ROWS-2||c<2||c>=COLS-2){MAP[r][c].t=3;continue;}
    if(MAP[r][c].t===0){
      const n=R42();
      if(c<6&&MAP[r][c].t!==2){MAP[r][c].t=n>.25?3:0;}
      else if(n>.88)MAP[r][c].t=3;
      else if(n>.83)MAP[r][c].t=4;
    }
  }
  // Starter buildings
  pb('house',   mc-4, mr-4); pb('house',   mc+5, mr-4);
  pb('well',    mc+1, mr-3); pb('farm',    mc-7, mr+2);
  pb('farm',    mc-7, mr+4); pb('market',  mc+5, mr+1);
  pb('logger',  mc+8, mr-4); pb('church',  mc-1, mr-6);
  // NPCs
  NPCS=[
    {name:'Elder Tua',x:(mc+1)*TW+TW/2,y:(mr-2)*TH_T+TH_T/2,dir:2,color:'#e8a040',msg:'Welcome to Gozo Village!\nWASD/Arrows to walk.\nE or Space to interact with buildings & people.'},
    {name:'Farmer Budi',x:(mc-6)*TW+TW/2,y:(mr+3)*TH_T+TH_T/2,dir:0,color:'#40b8e8',msg:'My crops grow well this season! Build more farms to feed the village.'},
    {name:'Merchant Sari',x:(mc+6)*TW+TW/2,y:(mr+2)*TH_T+TH_T/2,dir:3,color:'#e840c0',msg:'I trade goods from afar. Upgrade the Market to earn more gold each day!'},
  ];
}

function pb(type,c,r){
  if(c<0||c>=COLS||r<0||r>=ROWS)return;
  if(MAP[r][c].t===2||MAP[r][c].t===3)return;
  MAP[r][c].t=1; MAP[r][c].bld={type,id:G.nid++,lv:1};
  G.bld.push({id:MAP[r][c].bld.id,type,lv:1,col:c,row:r});
}

// Tile variation seeds
const TV={};
function tv(c,r){const k=c*1e4+r;if(!TV[k]){const s=Math.sin(c*127.1+r*311.7)*43758;TV[k]=s-(s|0);}return TV[k];}

// ── DRAW TILE ──
function drawTile(c,r,sx,sy){
  const t=MAP[r][c],v=tv(c,r);
  switch(t.t){
    case 0:{
      const g=v*22|0;
      X.fillStyle=`rgb(${80+g},${158+g},${48+g})`;X.fillRect(sx,sy,TW,TH_T);
      X.fillStyle=`rgba(255,255,255,0.06)`;X.fillRect(sx,sy,TW,TH_T*0.35);
      if((c*7+r*13)%4===0&&!t.bld){
        X.fillStyle=`rgba(18,80,8,${0.09+v*0.06})`;
        X.beginPath();X.ellipse(sx+TW*(0.3+v*0.4),sy+TH_T*(0.4+v*0.3),TW*0.22+v*6,TH_T*0.16+v*4,v*2,0,Math.PI*2);X.fill();
      }
      if((c*3+r*11)%5===0&&!t.bld){
        X.strokeStyle='rgba(28,105,12,0.48)';X.lineWidth=1.5;
        const gx=sx+TW*(0.28+v*0.42),gy=sy+TH_T*(0.55+v*0.28);
        X.beginPath();X.moveTo(gx,gy);X.lineTo(gx-1,gy-7);X.stroke();
        X.beginPath();X.moveTo(gx+6,gy);X.lineTo(gx+7,gy-8);X.stroke();
        X.beginPath();X.moveTo(gx+12,gy);X.lineTo(gx+11,gy-6);X.stroke();
      }
      if((c*5+r*9)%7===0){X.fillStyle='rgba(255,215,50,0.48)';X.beginPath();X.arc(sx+TW*(0.62+v*0.2),sy+TH_T*(0.52+v*0.25),2,0,Math.PI*2);X.fill();}
      break;
    }
    case 1:{
      const g=v*14|0;
      X.fillStyle=`rgb(${186+g},${152+g},${84+g})`;X.fillRect(sx,sy,TW,TH_T);
      X.fillStyle='rgba(255,255,255,0.05)';X.fillRect(sx,sy,TW,TH_T*0.28);
      if((c+r)%2===0){X.strokeStyle='rgba(0,0,0,0.07)';X.lineWidth=1;X.strokeRect(sx+4,sy+4,TW-8,TH_T-8);}
      break;
    }
    case 2:{
      const w=(Date.now()/900+c*0.3+r*0.22)%(Math.PI*2),wb=Math.sin(w)*3|0;
      X.fillStyle=`rgb(${46+wb},${112+wb},${205+wb})`;X.fillRect(sx,sy,TW,TH_T);
      X.fillStyle=`rgba(160,210,255,${0.14+Math.sin(w+1)*0.07})`;
      X.fillRect(sx+TW*.08,sy+TH_T*.18,TW*.84,TH_T*.28);
      break;
    }
    case 3:{
      const g=v*12|0;
      X.fillStyle=`rgb(${38+g},${84+g},${22+g})`;X.fillRect(sx,sy,TW,TH_T);
      break;
    }
    case 4:{
      const g=v*16|0;
      X.fillStyle=`rgb(${125+g},${118+g},${105+g})`;X.fillRect(sx,sy,TW,TH_T);
      break;
    }
  }
  // bottom-edge shadow for slight depth
  X.fillStyle='rgba(0,0,0,0.08)';X.fillRect(sx,sy+TH_T-2,TW,2);
}

// ── TREE / ROCK / BUILDING DECOS ──
function drawTree(sx,sy,v){
  const cx=sx+TW/2,bot=sy+TH_T;
  X.fillStyle='rgba(0,0,0,0.2)';X.beginPath();X.ellipse(cx+2,bot-4,TW*.25,6,0,0,Math.PI*2);X.fill();
  X.fillStyle='#5a3210';X.fillRect(cx-4,bot-20,8,20);
  X.fillStyle='#3a2010';X.fillRect(cx+1,bot-20,3,20);
  X.fillStyle='#143a0a';X.beginPath();X.arc(cx,bot-38,18,0,Math.PI*2);X.fill();
  X.fillStyle='#206018';X.beginPath();X.arc(cx-2,bot-44,14,0,Math.PI*2);X.fill();
  X.fillStyle='#2e8022';X.beginPath();X.arc(cx-3,bot-50,9,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(90,190,55,0.2)';X.beginPath();X.arc(cx-5,bot-55,5,0,Math.PI*2);X.fill();
}

function drawRock(sx,sy,v){
  const cx=sx+TW/2,bot=sy+TH_T;
  X.fillStyle='rgba(0,0,0,0.17)';X.beginPath();X.ellipse(cx+2,bot-5,TW*.23,6,0,0,Math.PI*2);X.fill();
  X.fillStyle='#787060';X.beginPath();X.ellipse(cx,bot-13,12,11,0,0,Math.PI*2);X.fill();
  X.fillStyle='#929488';X.beginPath();X.ellipse(cx-2,bot-15,9,8,0,0,Math.PI*2);X.fill();
  X.fillStyle='#b0b0a8';X.beginPath();X.ellipse(cx-4,bot-18,5,4,0,0,Math.PI*2);X.fill();
  X.fillStyle='#787060';X.beginPath();X.ellipse(cx+11,bot-9,6,5,0,0,Math.PI*2);X.fill();
}

function F(x,y,w,h,col){X.fillStyle=col;X.fillRect(Math.round(x),Math.round(y),w,h);}
function L(x1,y1,x2,y2,col,lw=1){X.strokeStyle=col;X.lineWidth=lw;X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();}
function win(wx,wy,ww,wh){
  F(wx,wy,ww,wh,'#1a3050');F(wx+1,wy+1,ww-2,wh-2,'#6ab0e0');
  F(wx+1,wy+1,3,2,'rgba(255,255,255,0.5)');
  L(wx+ww/2,wy+1,wx+ww/2,wy+wh-1,'rgba(0,0,0,0.25)');
  L(wx+1,wy+wh/2,wx+ww-1,wy+wh/2,'rgba(0,0,0,0.25)');
  X.strokeStyle='rgba(0,0,0,0.4)';X.lineWidth=1;X.strokeRect(wx,wy,ww,wh);
}
function smoke(sx,sy){
  const t=Date.now()/800;
  for(let i=0;i<3;i++){
    X.fillStyle=`rgba(190,190,190,${0.3-i*0.08})`;
    X.beginPath();X.arc(sx+Math.sin(t+i*1.1)*2.5,sy-i*5,3+i,0,Math.PI*2);X.fill();
  }
}

function drawBuilding(type,lv,sx,sy){
  const cx=sx+TW/2,bot=sy+TH_T;
  X.fillStyle='rgba(0,0,0,0.18)';X.beginPath();X.ellipse(cx+2,bot-3,TW*.34,7,0,0,Math.PI*2);X.fill();
  switch(type){
    case 'house':{
      const W=32+lv*4,H=22+lv*3;
      F(cx-W/2,bot-H-14,W,H,'#d8b870');
      F(cx-W/2+1,bot-H-13,W-2,4,'rgba(255,255,255,0.08)');
      // plank lines
      X.strokeStyle='rgba(0,0,0,0.08)';X.lineWidth=1;
      for(let i=6;i<H;i+=6)L(cx-W/2,bot-H-14+i,cx+W/2,bot-H-14+i,'rgba(0,0,0,0.07)');
      // door
      const dw=9,dh=13;F(cx-dw/2,bot-dh-1,dw,dh,'#8a5020');
      F(cx-dw/2+1,bot-dh+2,dw-2,4,'rgba(0,0,0,0.2)');
      F(cx+dw/2-3,bot-dh/2-1,2,2,'#c8a040');
      X.strokeStyle='#1c1008';X.lineWidth=1;X.strokeRect(cx-dw/2,bot-dh-1,dw,dh);
      // windows
      win(cx-W/2+4,bot-H-6,8,7);if(lv>=2)win(cx+W/2-12,bot-H-6,8,7);
      X.strokeStyle='#1c1008';X.lineWidth=1.5;X.strokeRect(cx-W/2,bot-H-14,W,H);
      // roof
      X.fillStyle='#a83020';X.beginPath();X.moveTo(cx-W/2-3,bot-H-14);X.lineTo(cx+W/2+3,bot-H-14);X.lineTo(cx,bot-H-14-15-lv*3);X.closePath();X.fill();
      X.fillStyle='#882010';X.beginPath();X.moveTo(cx,bot-H-14-15-lv*3);X.lineTo(cx+W/2+3,bot-H-14);X.lineTo(cx+W/2-2,bot-H-14);X.closePath();X.fill();
      // chimney
      F(cx+W/2-9,bot-H-28,7,16,'#808080');F(cx+W/2-8,bot-H-29,5,4,'#606060');
      smoke(cx+W/2-5,bot-H-30);
      break;
    }
    case 'farm':{
      const fw=TW*.88,fh=TH_T*.52;
      F(cx-fw/2,bot-fh-1,fw,fh,'#7a5820');
      for(let i=0;i<3+lv;i++){
        const fy=bot-fh-1+i*(fh/(3+lv));
        X.strokeStyle='rgba(0,0,0,0.1)';X.lineWidth=1;
        X.beginPath();X.moveTo(cx-fw/2,fy);X.lineTo(cx+fw/2,fy);X.stroke();
        if(lv>=2){X.fillStyle='#40b030';for(let j=0;j<4;j++)F(cx-fw/2+j*(fw/4)+6,fy+2,3,5,'#40b030');}
      }
      F(cx-7,bot-26,14,12,'#c8a050');
      X.fillStyle='#802010';X.beginPath();X.moveTo(cx-9,bot-26);X.lineTo(cx+9,bot-26);X.lineTo(cx,bot-38);X.closePath();X.fill();
      X.strokeStyle='#1c1008';X.lineWidth=1;X.strokeRect(cx-7,bot-26,14,12);
      break;
    }
    case 'well':{
      X.fillStyle='#707060';X.beginPath();X.ellipse(cx,bot-6,13,7,0,0,Math.PI*2);X.fill();
      F(cx-11,bot-19,22,13,'#909080');X.strokeStyle='#505040';X.lineWidth=1;X.strokeRect(cx-11,bot-19,22,13);
      F(cx-12,bot-32,4,20,'#7a5030');F(cx+8,bot-32,4,20,'#7a5030');
      F(cx-10,bot-34,20,4,'#6a4020');
      L(cx,bot-30,cx,bot-19,'#503010',1.5);
      X.fillStyle='#4a6080';X.beginPath();X.ellipse(cx,bot-18,5,3,0,0,Math.PI*2);X.fill();
      X.fillStyle='#a83020';X.beginPath();X.moveTo(cx-14,bot-32);X.lineTo(cx+14,bot-32);X.lineTo(cx,bot-48);X.closePath();X.fill();
      break;
    }
    case 'church':{
      const W=34,H=28;
      F(cx-W/2,bot-H-2,W,H,'#e0e0d8');
      X.fillStyle='#3a5070';X.beginPath();X.arc(cx,bot-H+4,6,Math.PI,0);X.fillRect(cx-6,bot-H+4,12,8);X.fill();
      X.fillStyle='rgba(160,210,255,0.55)';X.beginPath();X.arc(cx,bot-H+4,5,Math.PI,0);X.fillRect(cx-5,bot-H+4,10,7);X.fill();
      win(cx-W/2+4,bot-H+8,8,7);if(lv>=2)win(cx+W/2-12,bot-H+8,8,7);
      F(cx-5,bot-18,10,18,'#5a3810');
      X.fillStyle='rgba(0,0,0,0.18)';X.beginPath();X.arc(cx,bot-18,5,Math.PI,0);X.fill();
      X.strokeStyle='#1c1008';X.lineWidth=1;X.strokeRect(cx-W/2,bot-H-2,W,H);
      F(cx-6,bot-H-22,12,22,'#d0d0c8');
      X.strokeStyle='rgba(0,0,0,0.15)';X.lineWidth=1;X.strokeRect(cx-6,bot-H-22,12,22);
      X.fillStyle='#a83020';X.beginPath();X.moveTo(cx-7,bot-H-22);X.lineTo(cx+7,bot-H-22);X.lineTo(cx,bot-H-38);X.closePath();X.fill();

// ── PLAYER SPRITE ──
function drawPlayer(){
  const px=Math.round(PL.x-camX), py=Math.round(PL.y-camY);
  const moving=PL.vx!==0||PL.vy!==0, f=PL.frame, dir=PL.dir;
  X.fillStyle='rgba(0,0,0,0.22)';X.beginPath();X.ellipse(px,py+5,10,4,0,0,Math.PI*2);X.fill();
  const skin='#f0c090',hair='#3a2010',shirt='#4080e0',pants='#303060',shoe='#201808';
  const bob=moving&&f%2===0?-1:0;
  // legs
  const lg=moving?(f%4<2?3:-3):0;
  F(px-5+lg,py-5+bob,5,8,pants);F(px-1-lg,py-5+bob,5,8,pants);
  F(px-5+lg,py+2+bob,5,3,shoe);F(px-1-lg,py+2+bob,5,3,shoe);
  // body
  F(px-5,py-16+bob,10,13,shirt);
  F(px-2,py-16+bob,4,3,'rgba(255,255,255,0.28)');
  // arms
  if(dir===1){F(px+4,py-16+bob,4,11,shirt);F(px+4,py-6+bob,4,4,skin);F(px-8,py-14+bob,4,8,shirt);F(px-8,py-7+bob,4,4,skin);}
  else if(dir===3){F(px-8,py-16+bob,4,11,shirt);F(px-8,py-6+bob,4,4,skin);F(px+4,py-14+bob,4,8,shirt);F(px+4,py-7+bob,4,4,skin);}

  // head
  F(px-5,py-27+bob,10,12,skin);

// ── INTERACTION ──
function doInteract(){
  if(document.getElementById('dialog').classList.contains('show')){closeDialog();return;}
  if(buildMode){exitBuildMode();notify('Build cancelled.','warn');return;}
  const pr=TW*1.7;
  for(const npc of NPCS){
    const dx=PL.x-npc.x,dy=PL.y-npc.y;
    if(Math.sqrt(dx*dx+dy*dy)<pr){showNPCDialog(npc);return;}
  }
  const pc=Math.floor(PL.x/TW),pr2=Math.floor(PL.y/TH_T);
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const r=pr2+dr,c=pc+dc;
    if(r<0||r>=ROWS||c<0||c>=COLS)continue;
    if(MAP[r][c].bld){showBldDialog(MAP[r][c].bld,c,r);return;}
  }
  notify('Nothing nearby. Walk close to a building or person.','warn');
}

function showNPCDialog(npc){
  openDialog(npc.name,npc.msg,[{label:'👋 Goodbye',cls:'ok',fn:closeDialog}]);
}
function showBldDialog(bld,c,r){
  const d=BD[bld.type];
  const pr=d.pr?'Produces: '+Object.entries(d.pr).map(([k,v])=>`+${v*bld.lv} ${k}`).join(', '):'';
  const msg=`Level ${bld.lv} / ${d.ml||3}  —  ${d.d}${pr?'\n'+pr:''}`;
  const btns=[];
  if(bld.lv<(d.ml||3))btns.push({label:'⬆ Upgrade',cls:'ok',fn:()=>tryUpgrade(bld,c,r)});
  btns.push({label:'🗑 Demolish',cls:'bad',fn:()=>tryDemolish(bld,c,r)});
  btns.push({label:'✖ Close',cls:'',fn:closeDialog});
  openDialog(`${d.e} ${d.n}`,msg,btns);
}
function tryUpgrade(bld,c,r){
  const d=BD[bld.type];
  if(bld.lv>=(d.ml||3)){notify('Already max level!','warn');closeDialog();return;}
  const cost={};for(const[k,v]of Object.entries(d.cost))cost[k]=Math.floor(v*1.6*bld.lv);
  if(!canAff(cost)){notify('Not enough resources!','err');closeDialog();return;}
  pay(cost);bld.lv++;
  const gb=G.bld.find(x=>x.id===bld.id);if(gb)gb.lv=bld.lv;
  notify(`⬆ ${d.n} upgraded to Lv.${bld.lv}!`,'ok');closeDialog();updateUI();
}
function tryDemolish(bld,c,r){
  const d=BD[bld.type];
  openDialog(`Demolish ${d.n}?`,'50% resources refunded.',[
    {label:'✓ Yes',cls:'bad',fn:()=>{
      for(const[k,v]of Object.entries(d.cost))addR(k,Math.floor(v*.5));
      G.bld=G.bld.filter(x=>x.id!==bld.id);
      MAP[r][c].bld=null;MAP[r][c].t=1;
      notify(`🗑 ${d.n} demolished.`,'warn');closeDialog();updateUI();
    }},
    {label:'✗ Cancel',cls:'',fn:closeDialog}
  ]);
}
function openDialog(name,msg,btns){
  document.getElementById('dname').textContent=name;
  document.getElementById('dmsg').innerHTML=msg.replace(/\n/g,'<br>');
  const bc=document.getElementById('dbtns');bc.innerHTML='';
  for(const b of btns){const el=document.createElement('button');el.className='dbtn '+b.cls;el.textContent=b.label;el.onclick=b.fn;bc.appendChild(el);}
  document.getElementById('dialog').classList.add('show');
}
function closeDialog(){document.getElementById('dialog').classList.remove('show');}

// ── BUILD MODE ──
let buildMode=null,bGhost={c:-1,r:-1};
function enterBuildMode(t){buildMode=t;closeDialog();notify(`📐 ${BD[t].n} — click tile to place, Esc to cancel`,'ok');}
function exitBuildMode(){buildMode=null;bGhost={c:-1,r:-1};}
function tryBuild(c,r){
  if(!buildMode)return;
  const d=BD[buildMode];
  if(!canAff(d.cost)){notify('Not enough resources!','err');return;}
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  const tile=MAP[r][c];
  if(tile.bld){notify('Already a building here!','err');return;}
  if(tile.t===2||tile.t===3){notify('Cannot build here!','err');return;}
  pay(d.cost);pb(buildMode,c,r);upPop();
  notify(`✅ ${d.n} built!`,'ok');exitBuildMode();updateUI();
}

// ── RESOURCES ──
function canAff(cost){return Object.entries(cost||{}).every(([k,v])=>(G.res[k]||0)>=v);}
function pay(cost){for(const[k,v]of Object.entries(cost||{}))G.res[k]=Math.max(0,(G.res[k]||0)-v);}
function addR(k,v){G.res[k]=Math.min(999,(G.res[k]||0)+v);}
function upPop(){G.cap=G.bld.filter(b=>b.type==='house').reduce((s,b)=>s+2*b.lv,0);G.pop=Math.min(G.pop+1,G.cap);}

// ── PRODUCTION ──
function doProd(){
  const mul=G.season===3?.65:G.season===1?1.15:1;
  const wm=G.bld.some(b=>b.type==='mill')?1.5:1;
  for(const b of G.bld){
    const d=BD[b.type];if(!d.pr)continue;
    for(const[r,a]of Object.entries(d.pr)){let fa=a*b.lv*mul;if(r==='food')fa*=wm;addR(r,Math.round(fa));}
  }
  const fc=Math.ceil(G.pop*.5);
  if(G.res.food>=fc)G.res.food-=fc;
  else G.happy=Math.max(10,G.happy-5);
  if(G.res.food>15&&G.pop<G.cap&&Math.random()<.2)G.pop++;
  updateUI();
}

// ── CLOCK ──
function tick(){
  if(G.paused)return;
  G.mn+=16.67*G.spd/10;
  if(G.mn>=60){G.mn=0;G.hr++;}
  if(G.hr>=24){G.hr=0;G.day++;G.ticks++;
    if(G.ticks%2===0)doProd();
    if(G.day>90){G.day=1;G.season=(G.season+1)%4;}
    if(G.day>360){G.day=1;G.yr++;}
  }
  document.getElementById('timelbl').textContent=`Day ${G.day} ${String(G.hr).padStart(2,'0')}:${String(G.mn|0).padStart(2,'0')}`;
  document.getElementById('season').textContent=G.seasons[G.season]+` Y${G.yr}`;
}

function updateUI(){
  document.getElementById('rw').textContent=G.res.wood;
  document.getElementById('rs').textContent=G.res.stone;
  document.getElementById('rc').textContent=G.res.coal;
  document.getElementById('rm').textContent=G.res.metal;
  document.getElementById('rf').textContent=G.res.food;
  document.getElementById('rg').textContent=G.res.gold;
  document.getElementById('pop').textContent=G.pop;
  document.getElementById('cap').textContent=G.cap;
}

function notify(msg,t='ok'){
  const el=document.createElement('div');
  el.className='ntf '+t;el.textContent=msg;
  document.getElementById('notifs').appendChild(el);
  setTimeout(()=>el.remove(),2700);
}

    MX.fillStyle=t.bld?'#e0a030':(tc[t.t]||'#3a7020');

  MX.fillStyle='#fff';MX.beginPath();MX.arc(px,py,2.5,0,Math.PI*2);MX.fill();

  MX.strokeRect((-camX/WW)*mw,(-camY/WH)*mh,(CV.width/WW)*mw,((CV.height-HUD_H-BOT_H)/WH)*mh);
}

// ── COLLISION ──
function solid(wx,wy){
  const c=Math.floor(wx/TW),r=Math.floor(wy/TH_T);
  if(c<0||c>=COLS||r<0||r>=ROWS)return true;
  const t=MAP[r][c];
  return t.t===2||t.t===3||!!t.bld;
}
function movePlayer(){
  let dx=0,dy=0;
  if(keys.has('arrowleft')||keys.has('a'))dx=-1;
  if(keys.has('arrowright')||keys.has('d'))dx=1;
  if(keys.has('arrowup')||keys.has('w'))dy=-1;
  if(keys.has('arrowdown')||keys.has('s'))dy=1;
  if(dx&&dy){dx*=.707;dy*=.707;}
  const sp=PL.spd,m=11;
  const nx=PL.x+dx*sp,ny=PL.y+dy*sp;
  if(!solid(nx-m,PL.y-m)&&!solid(nx+m,PL.y-m)&&!solid(nx-m,PL.y+m)&&!solid(nx+m,PL.y+m))PL.x=nx;
  if(!solid(PL.x-m,ny-m)&&!solid(PL.x+m,ny-m)&&!solid(PL.x-m,ny+m)&&!solid(PL.x+m,ny+m))PL.y=ny;
  if(dx<0)PL.dir=3;else if(dx>0)PL.dir=1;
  if(dy<0)PL.dir=0;else if(dy>0)PL.dir=2;
  PL.vx=dx;PL.vy=dy;
  if(dx||dy){PL.ft++;if(PL.ft>8){PL.ft=0;PL.frame++;}}else{PL.frame=0;PL.ft=0;}
}

function updateCam(){
  const vw=CV.width,vh=CV.height-HUD_H-BOT_H;
  let tx=Math.round(-(PL.x-vw/2)),ty=Math.round(-(PL.y-vh/2));
  tx=Math.min(0,Math.max(tx,-(WW-vw)));
  ty=Math.min(0,Math.max(ty,-(WH-vh)));
  camX+=(tx-camX)*.14;camY+=(ty-camY)*.14;
}

// ── RENDER ──
function render(){
  const vw=CV.width,vh=CV.height;
  X.fillStyle='#1a2e10';X.fillRect(0,0,vw,vh);
  X.save();X.translate(0,HUD_H);
  const sc=Math.max(0,Math.floor(-camX/TW)-1);
  const sr=Math.max(0,Math.floor(-camY/TH_T)-1);
  const ec=Math.min(COLS,sc+Math.ceil(vw/TW)+3);
  const er=Math.min(ROWS,sr+Math.ceil((vh-HUD_H-BOT_H)/TH_T)+3);

  // Pass 1: tiles
  for(let r=sr;r<er;r++)for(let c=sc;c<ec;c++)drawTile(c,r,c*TW+camX,r*TH_T+camY);

  // Pass 2: decos + entities per row (depth sort)
  for(let r=sr;r<er;r++){
    const ry=r*TH_T+camY;
    // NPCs in this row
    for(const npc of NPCS){if(Math.floor(npc.y/TH_T)===r)drawNPC(npc);}
    // player
    if(Math.floor(PL.y/TH_T)===r)drawPlayer();
    // tile decos + buildings
    for(let c=sc;c<ec;c++){
      const t=MAP[r][c],sx=c*TW+camX;
      if(t.t===3&&!t.bld)drawTree(sx,ry,tv(c,r));
      else if(t.t===4&&!t.bld)drawRock(sx,ry,tv(c,r));
      if(t.bld)drawBuilding(t.bld.type,t.bld.lv,sx,ry);
    }
  }

  // Build ghost
  if(buildMode&&bGhost.c>=0&&bGhost.r>=0&&bGhost.r<ROWS&&bGhost.c<COLS){
    const sx=bGhost.c*TW+camX,sy=bGhost.r*TH_T+camY;
    const ok=MAP[bGhost.r]&&MAP[bGhost.r][bGhost.c]&&MAP[bGhost.r][bGhost.c].t!==2&&MAP[bGhost.r][bGhost.c].t!==3&&!MAP[bGhost.r][bGhost.c].bld;
    X.fillStyle=ok?'rgba(80,255,80,0.22)':'rgba(255,80,80,0.22)';X.fillRect(sx,sy,TW,TH_T);
    X.strokeStyle=ok?'rgba(80,255,80,0.8)':'rgba(255,80,80,0.8)';X.lineWidth=2;X.strokeRect(sx,sy,TW,TH_T);
    if(ok){X.globalAlpha=.45;drawBuilding(buildMode,1,sx,sy);X.globalAlpha=1;}
  }
  X.restore();
  drawMinimap();
}

// ── BUILD MENU DOM ──
let bmOpen=false;
function toggleBuildMenu(){bmOpen=!bmOpen;document.getElementById('bm').style.display=bmOpen?'flex':'none';}
function createBuildMenu(){
  const el=document.createElement('div');
  el.id='bm';
  el.style.cssText='position:fixed;bottom:38px;left:50%;transform:translateX(-50%);z-index:200;background:rgba(4,2,1,.97);border:3px solid #5a3a1a;width:680px;max-width:96vw;flex-direction:column;display:none;box-shadow:0 -4px 24px rgba(0,0,0,.85);';
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-bottom:2px solid #3a2a10;">
    <span style="font-family:'Press Start 2P';font-size:7px;color:#f0c040;">🏗 BUILD MENU &nbsp;<span style="font-size:6px;color:#806040">(B to toggle)</span></span>
    <button onclick="toggleBuildMenu()" style="background:#200a04;border:2px solid #802020;color:#c04040;font-family:'Press Start 2P';font-size:6px;cursor:pointer;padding:2px 7px;">✖ CLOSE</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:5px;padding:9px 11px;max-height:165px;overflow-y:auto;scrollbar-width:thin;" id="bmbody"></div>`;
  document.body.appendChild(el);
  const body=document.getElementById('bmbody');
  const icons={wood:'🪵',stone:'🪨',coal:'⚫',iron:'⚙',metal:'⚙',food:'🌾',gold:'💰'};
  for(const[id,d]of Object.entries(BD)){
    const cost=Object.entries(d.cost).map(([k,v])=>icons[k]+v).join(' ');
    const btn=document.createElement('div');
    btn.style.cssText='background:#100a04;border:2px solid #3a2a10;padding:6px 9px;cursor:pointer;text-align:center;min-width:76px;transition:border-color .12s;';
    btn.innerHTML=`<div style="font-size:18px;margin-bottom:2px">${d.e}</div><div style="font-family:'Press Start 2P';font-size:5px;color:#f0c040;margin-bottom:2px">${d.n}</div><div style="font-size:11px;color:#a08050">${cost}</div>`;
    btn.onmouseenter=()=>btn.style.borderColor='#f0c040';
    btn.onmouseleave=()=>btn.style.borderColor='#3a2a10';
    btn.onclick=()=>{enterBuildMode(id);toggleBuildMenu();};
    body.appendChild(btn);
  }
}

// ── BOTTOM BAR DOM ──
function createBotBar(){
  const bar=document.createElement('div');
  bar.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(4,2,1,.93);border-top:2px solid #5a3a1a;height:38px;padding:4px 12px;display:flex;align-items:center;justify-content:center;gap:10px;';
  const btn=(label,fn,id='')=>{
    const b=document.createElement('button');
    b.id=id;b.textContent=label;b.onclick=fn;
    b.style.cssText='padding:3px 8px;background:#100a04;border:2px solid #3a2a10;color:#a08050;font-family:"Press Start 2P";font-size:6px;cursor:pointer;';
    b.onmouseenter=()=>b.style.borderColor='#f0c040';
    b.onmouseleave=()=>b.style.borderColor='#3a2a10';
    return b;
  };
  const tip=document.createElement('span');
  tip.style.cssText='font-family:"Press Start 2P";font-size:5px;color:#605040;letter-spacing:.5px;';
  tip.textContent='WASD / ↑↓←→ MOVE  |  E / SPACE INTERACT  |  B BUILD';
  bar.appendChild(btn('🏗 BUILD (B)',toggleBuildMenu));
  bar.appendChild(document.createElement('div')).style.cssText='width:2px;height:22px;background:#3a2a10;';
  bar.appendChild(tip);
  bar.appendChild(document.createElement('div')).style.cssText='width:2px;height:22px;background:#3a2a10;';
  const pb=btn('⏸ PAUSE',()=>{G.paused=!G.paused;pb.textContent=G.paused?'▶ PLAY':'⏸ PAUSE';});bar.appendChild(pb);
  const sp=document.createElement('select');
  sp.style.cssText='background:#100a04;border:2px solid #3a2a10;color:#a08050;font-family:"Press Start 2P";font-size:6px;padding:2px 4px;cursor:pointer;';
  sp.innerHTML='<option value="1">1x</option><option value="2">2x</option><option value="3">3x</option>';
  sp.onchange=()=>G.spd=+sp.value;bar.appendChild(sp);
  document.body.appendChild(bar);
}

// ── RESIZE ──
function resize(){CV.width=window.innerWidth;CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ── MAIN LOOP ──
let lastT=0;
function loop(now){
  const dt=Math.min(now-lastT,50);lastT=now;
  if(!G.paused){movePlayer();updateCam();tick();}
  render();
  requestAnimationFrame(loop);
}

// ── INIT ──
genMap();upPop();updateUI();
createBuildMenu();createBotBar();
// center camera on village center
const mc2=COLS/2|0,mr2=ROWS/2|0;
PL.x=(mc2+1)*TW;PL.y=(mr2+1)*TH_T;
camX=-(PL.x-window.innerWidth/2);
camY=-(PL.y-(window.innerHeight-HUD_H-BOT_H)/2);
requestAnimationFrame(loop);
</script>
